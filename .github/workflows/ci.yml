name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: ["**"]

jobs:
  # ──────────────────────────────
  # CI: run on every push / PR
  # ──────────────────────────────
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64]
        include:
          - goos: linux
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: true

      # The project is hosted in mainland China; route module downloads through
      # a domestic mirror and disable the checksum database to avoid timeouts.
      - name: Configure Go proxy (CN)
        run: |
          echo "GOPROXY=https://goproxy.cn,direct" >> "$GITHUB_ENV"
          echo "GOSUMDB=off" >> "$GITHUB_ENV"

      - name: Vet
        run: go vet ./...

      - name: Test (with race detector)
        run: go test -race -count=1 ./...

      - name: Upload coverage
        run: go test -coverprofile=coverage.out ./...
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

      # ---------- Build + UPX for all platforms ----------
      - name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          ext=""
          [ "$GOOS" = "windows" ] && ext=".exe"
          BIN="feedshit-${{ matrix.goos }}-${{ matrix.goarch }}${ext}"
          go build -ldflags="-s -w" -trimpath -o "$BIN" ./cmd/feedshit/
          echo "BIN=$BIN" >> "$GITHUB_ENV"

      - name: UPX compress
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq upx
          BEFORE=$(stat -c%s "${{ env.BIN }}")
          UPX_FLAGS="--best --lzma"
          [ "${{ matrix.goos }}" = "darwin" ] && UPX_FLAGS="$UPX_FLAGS --force-macos"
          upx $UPX_FLAGS -o "${{ env.BIN }}-upx" "${{ env.BIN }}"
          mv "${{ env.BIN }}-upx" "${{ env.BIN }}"
          sha256sum "${{ env.BIN }}" > "${{ env.BIN }}.sha256"
          AFTER=$(stat -c%s "${{ env.BIN }}")
          echo "📦 ${{ matrix.goos }}/${{ matrix.goarch }}: $BEFORE → $AFTER bytes ($(( (BEFORE - AFTER) * 100 / BEFORE ))% reduction)"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: feedshit-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            ${{ env.BIN }}
            ${{ env.BIN }}.sha256
          retention-days: 7

  # ──────────────────────────────
  # Release: only when tag is pushed (v*)
  # ──────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64]
        include:
          - goos: linux
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: true

      - name: Configure Go proxy (CN)
        run: |
          echo "GOPROXY=https://goproxy.cn,direct" >> "$GITHUB_ENV"
          echo "GOSUMDB=off" >> "$GITHUB_ENV"

      - name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          ext=""
          [ "$GOOS" = "windows" ] && ext=".exe"
          BIN="feedshit-${{ matrix.goos }}-${{ matrix.goarch }}${ext}"
          go build -ldflags="-s -w" -trimpath -o "$BIN" ./cmd/feedshit/
          echo "BIN=$BIN" >> "$GITHUB_ENV"

      - name: Install UPX
        run: sudo apt-get update -qq && sudo apt-get install -y -qq upx

      - name: UPX compress
        run: |
          UPX_FLAGS="--best --lzma"
          [ "${{ matrix.goos }}" = "darwin" ] && UPX_FLAGS="$UPX_FLAGS --force-macos"
          upx $UPX_FLAGS -o "${{ env.BIN }}-upx" "${{ env.BIN }}"
          mv "${{ env.BIN }}-upx" "${{ env.BIN }}"

      - name: Checksum
        run: sha256sum "${{ env.BIN }}" > "${{ env.BIN }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: feedshit-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            ${{ env.BIN }}
            ${{ env.BIN }}.sha256

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: FeedShit ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: ""
          files: |
            ${{ env.BIN }}
            ${{ env.BIN }}.sha256
          draft: false
          prerelease: false
