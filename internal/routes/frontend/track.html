<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>反馈跟踪</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f5f5;--fg:#333;--card-bg:#fff;--card-border:#e2e2e2;--input-border:#d0d0d0;--muted:#888;--note-bg:#f9f9f9;--note-border:#eee;--note-admin-bg:#f0f7ff;--note-admin-border:#d0e3f7;--primary:#333;--primary-fg:#fff;--danger:#c00;--danger-bg:#fde8e8;--subtle:#fafafa;--hover:#f0f0f0;--link:#2563eb;--status-pending-bg:#fff3cd;--status-pending-fg:#856404;--status-processing-bg:#cce5ff;--status-processing-fg:#004085;--status-resolved-bg:#d4edda;--status-resolved-fg:#155724;--status-closed-bg:#e2e3e5;--status-closed-fg:#383d41;--success-bg:#e6f9e6;--success-fg:#1a7a1a;--success-border:#b2e0b2}
[data-theme="dark"]{--bg:#1a1a2e;--fg:#e0e0e0;--card-bg:#16213e;--card-border:#2a2a4a;--input-border:#3a3a5a;--muted:#8888aa;--note-bg:#1e1e3a;--note-border:#2a2a4a;--note-admin-bg:#1a2a4a;--note-admin-border:#2a4a6a;--primary:#2d2d4a;--primary-fg:#fff;--danger:#ff6b6b;--danger-bg:#3a1f1f;--subtle:#1e1e3a;--hover:#2a2a4a;--link:#7fb6eb;--status-pending-bg:#4a4318;--status-pending-fg:#f1d56e;--status-processing-bg:#1f3a56;--status-processing-fg:#7fb6eb;--status-resolved-bg:#1c3a28;--status-resolved-fg:#7ac99a;--status-closed-bg:#3a3a3a;--status-closed-fg:#bbb;--success-bg:#1c3a28;--success-fg:#7ac99a;--success-border:#2a4a3a}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);line-height:1.6}
.container{max-width:600px;margin:40px auto;padding:0 16px}
h1{font-size:1.4rem;font-weight:600;margin-bottom:6px}
.subtitle{color:var(--muted);font-size:.85rem;margin-bottom:24px}
.card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:6px;padding:24px;margin-bottom:16px}
.field{margin-bottom:16px}
.field label{display:block;font-size:.85rem;font-weight:500;margin-bottom:4px;color:var(--muted)}
.field input[type=text],.field textarea{width:100%;padding:8px 10px;border:1px solid var(--input-border);border-radius:4px;font-size:.9rem;font-family:inherit;background:var(--card-bg);color:var(--fg);transition:border-color .15s}
.field input:focus,.field textarea:focus{outline:none;border-color:#888}
.field textarea{resize:vertical;min-height:80px}
.btn{display:inline-block;padding:10px 24px;background:var(--primary);color:var(--primary-fg);border:none;border-radius:4px;font-size:.9rem;cursor:pointer;transition:background .15s}
.btn:hover{background:var(--hover)}
.btn:disabled{background:#3a3a3a;color:#666;cursor:not-allowed}
.btn-sm{padding:6px 16px;font-size:.8rem}
.status{margin-top:12px;padding:10px;border-radius:4px;font-size:.85rem;display:none}
.status.success{display:block;background:var(--success-bg);color:var(--success-fg);border:1px solid var(--success-border)}
.status.error{display:block;background:var(--danger-bg);color:var(--danger);border:1px solid #f5c6c6}
/* Lookup form */
.lookup-section{text-align:center}
.lookup-section .token-input{display:flex;gap:8px;max-width:400px;margin:0 auto}
.lookup-section .token-input input{flex:1}
/* Feedback detail */
.fb-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.fb-header h2{font-size:1.1rem;font-weight:600;flex:1}
.fb-status{display:inline-block;padding:3px 10px;border-radius:12px;font-size:.75rem;font-weight:500;white-space:nowrap}
.fb-status.pending{background:var(--status-pending-bg);color:var(--status-pending-fg)}
.fb-status.processing{background:var(--status-processing-bg);color:var(--status-processing-fg)}
.fb-status.resolved{background:var(--status-resolved-bg);color:var(--status-resolved-fg)}
.fb-status.closed{background:var(--status-closed-bg);color:var(--status-closed-fg)}
.fb-meta{font-size:.8rem;color:var(--muted);margin-bottom:16px}
.fb-desc{font-size:.9rem;color:var(--fg);white-space:pre-wrap;margin-bottom:20px;padding:12px;background:var(--note-bg);border-radius:4px;border:1px solid var(--note-border)}
/* Notes timeline */
.notes-section h3{font-size:.9rem;font-weight:600;margin-bottom:12px;color:var(--muted)}
.note-item{padding:12px;margin-bottom:8px;border-radius:6px;border:1px solid var(--note-border);background:var(--note-bg)}
.note-item.admin{background:var(--note-admin-bg);border-color:var(--note-admin-border)}
.note-item.submitter{background:var(--note-bg);border-color:var(--note-border)}
.note-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.note-author{font-size:.8rem;font-weight:600;color:var(--muted)}
.note-author.admin{color:var(--status-processing-fg)}
.note-author.submitter{color:var(--muted)}
.note-time{font-size:.7rem;color:var(--muted)}
.note-content{font-size:.85rem;color:var(--fg);white-space:pre-wrap}
.no-notes{text-align:center;color:var(--muted);font-size:.85rem;padding:20px 0}
/* Reply form */
.reply-section{margin-top:20px;padding-top:16px;border-top:1px solid var(--note-border)}
.reply-section h3{font-size:.9rem;font-weight:600;margin-bottom:12px;color:var(--muted)}
.reply-form textarea{margin-bottom:8px}
.reply-form .file-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.reply-form .file-row input[type=file]{font-size:.8rem}
.reply-form .btn-row{display:flex;justify-content:flex-end;gap:8px}
/* Dark mode toggle */
.theme-toggle{position:fixed;top:12px;right:16px;z-index:100}
.theme-toggle button{background:none;border:1px solid var(--input-border);border-radius:4px;padding:4px 10px;font-size:.85rem;cursor:pointer;color:var(--muted)}
.theme-toggle button:hover{background:var(--note-bg)}
/* Loading */
.loading{text-align:center;padding:40px;color:var(--muted)}
.loading .spinner{display:inline-block;width:24px;height:24px;border:3px solid #e0e0e0;border-top-color:#888;border-radius:50%;animation:spin .6s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}
/* ===== Dark mode surface repaint ===== */
[data-theme="dark"] body{background:var(--bg);color:var(--fg)}
[data-theme="dark"] a{color:var(--link)}
[data-theme="dark"] .btn{background:var(--primary);color:var(--primary-fg)}
[data-theme="dark"] .btn:hover{background:var(--hover)}
[data-theme="dark"] .btn:disabled{background:#3a3a3a;color:#666}
[data-theme="dark"] .status.success{background:var(--success-bg);color:var(--success-fg);border-color:var(--success-border)}
[data-theme="dark"] .status.error{background:var(--danger-bg);color:var(--danger);border-color:#5a2a2a}
[data-theme="dark"] .loading .spinner{border-color:#3a3a5a;border-top-color:#8888aa}
[data-theme="dark"] .theme-toggle button{color:var(--muted);border-color:var(--input-border)}
[data-theme="dark"] .theme-toggle button:hover{background:var(--hover)}
</style>
</head>
<body>
<div class="theme-toggle"><button onclick="toggleTheme()" id="themeBtn">🌙 暗黑</button></div>
<div class="container">
  <h1>反馈跟踪</h1>
  <p class="subtitle">输入跟踪令牌查看反馈处理进度</p>

  <!-- Lookup form -->
  <div class="card lookup-section" id="lookupCard">
    <div class="field">
      <label for="tokenInput">跟踪令牌</label>
      <div class="token-input">
        <input type="text" id="tokenInput" placeholder="粘贴您的跟踪令牌" autocomplete="off">
        <button class="btn" id="lookupBtn" onclick="doLookup()">查询</button>
      </div>
    </div>
    <div class="status" id="lookupStatus"></div>
  </div>

  <!-- Feedback detail (hidden until lookup) -->
  <div id="detailSection" style="display:none">
    <div class="card">
      <div class="fb-header">
        <h2 id="fbTitle"></h2>
        <span class="fb-status" id="fbStatus"></span>
      </div>
      <div class="fb-meta">
        编号 #<span id="fbId"></span> &middot;
        项目 <span id="fbProject"></span> &middot;
        提交于 <span id="fbDate"></span>
      </div>
      <div class="fb-desc" id="fbDesc"></div>
      <div class="fb-vote" id="fbVote" style="margin-top:10px;display:none">
        <button class="vote-btn" id="voteBtn" onclick="voteFeedback()">👍 有用 (<span id="voteCount">0</span>)</button>
      </div>
      <div class="fb-rating" id="fbRating" style="margin-top:12px;display:none">
        <div style="font-size:.8rem;color:#666;margin-bottom:4px">为本次服务评分：</div>
        <div id="ratingStars" style="font-size:1.4rem;cursor:pointer"></div>
        <textarea id="ratingComment" placeholder="说点什么（选填）..." style="width:100%;margin-top:6px;padding:6px;border:1px solid #d0d0d0;border-radius:6px;font-size:.85rem"></textarea>
        <button class="btn btn-sm" id="ratingBtn" onclick="submitRating()" style="margin-top:6px">提交评分</button>
        <span id="ratingDone" style="color:#22c55e;font-size:.8rem;margin-left:8px"></span>
      </div>
    </div>

    <div class="card">
      <div class="notes-section">
        <h3>处理记录与回复</h3>
        <div id="notesList"></div>
      </div>
      <div class="reply-section">
        <h3>补充回复</h3>
        <div class="reply-form">
          <textarea id="replyContent" placeholder="如有补充信息请在此填写..."></textarea>
          <div class="file-row">
            <input type="file" id="replyFile" multiple>
            <span id="fileNames" style="font-size:.75rem;color:var(--muted)"></span>
          </div>
          <div class="btn-row">
            <button class="btn btn-sm" id="replyBtn" onclick="doReply()">提交回复</button>
          </div>
          <div class="status" id="replyStatus"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  var statusLabels = {pending:'待处理',processing:'处理中',resolved:'已解决',closed:'已关闭'};
  var currentToken = '';
  var currentId = 0;
  var ratingScore = 0;
  var THEME_KEY = 'feedshit-theme';

  function prefersDark(){ return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches; }
  function applyTheme(t){
    document.documentElement.setAttribute('data-theme', t);
    var btn = document.getElementById('themeBtn');
    if (btn) btn.textContent = (t === 'dark') ? '☀️ 明亮' : '🌙 暗黑';
  }
  function initTheme(){
    var saved = null;
    try { saved = localStorage.getItem(THEME_KEY); } catch (e) {}
    applyTheme(saved || (prefersDark() ? 'dark' : 'light'));
  }
  window.toggleTheme = function(){
    var cur = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    applyTheme(cur);
    try { localStorage.setItem(THEME_KEY, cur); } catch (e) {}
  };
  if (window.matchMedia){
    var mq = window.matchMedia('(prefers-color-scheme: dark)');
    mq.addEventListener('change', function(e){
      var saved = null;
      try { saved = localStorage.getItem(THEME_KEY); } catch (err) {}
      if (!saved) applyTheme(e.matches ? 'dark' : 'light');
    });
  }
  initTheme();

  // Check URL hash for token
  function initFromHash() {
    var hash = window.location.hash;
    if (hash && hash.startsWith('#token=')) {
      var token = decodeURIComponent(hash.substring(7));
      if (token) {
        document.getElementById('tokenInput').value = token;
        doLookup();
      }
    }
  }

  window.doLookup = function() {
    var token = document.getElementById('tokenInput').value.trim();
    if (!token) {
      showLookupStatus('error', '请输入跟踪令牌');
      return;
    }
    currentToken = token;

    // Show loading
    document.getElementById('detailSection').style.display = 'none';
    showLookupStatus('loading', '<div class="loading"><div class="spinner"></div><div>正在查询...</div></div>');

    fetch('/api/v1/track/feedback?token=' + encodeURIComponent(token))
      .then(function(r){ return r.json().then(function(d){ return {status: r.status, data: d}; }); })
      .then(function(res){
        if (res.status === 200) {
          hideLookupStatus();
          renderFeedback(res.data);
        } else {
          showLookupStatus('error', res.data.error || '查询失败');
        }
      })
      .catch(function(){
        showLookupStatus('error', '网络错误，请稍后重试');
      });
  };

  function renderFeedback(data) {
    document.getElementById('fbId').textContent = data.id;
    document.getElementById('fbTitle').textContent = data.title;
    document.getElementById('fbProject').textContent = data.project_id;
    document.getElementById('fbDate').textContent = data.created_at;

    var statusEl = document.getElementById('fbStatus');
    statusEl.textContent = statusLabels[data.status] || data.status;
    statusEl.className = 'fb-status ' + (data.status || '');

    var desc = data.description || '（无详细描述）';
    document.getElementById('fbDesc').textContent = desc;
    currentId = data.id;

    // Vote display
    var voteBox = document.getElementById('fbVote');
    if (data.votes != null) {
      voteBox.style.display = 'block';
      document.getElementById('voteCount').textContent = data.votes;
    } else {
      voteBox.style.display = 'none';
    }

    // Rating (CSAT) — only when resolved
    var ratingBox = document.getElementById('fbRating');
    if (data.allow_rating) {
      ratingBox.style.display = 'block';
      renderStars();
      document.getElementById('ratingComment').value = '';
      document.getElementById('ratingDone').textContent = data.rating ? ('您已评分：' + data.rating + ' 星') : '';
    } else {
      ratingBox.style.display = 'none';
    }

    // Render notes
    var notesList = document.getElementById('notesList');
    var notes = data.notes || [];
    if (notes.length === 0) {
      notesList.innerHTML = '<div class="no-notes">暂无回复记录</div>';
    } else {
      var html = '';
      notes.forEach(function(n){
        var isSubmitter = n.author === '提交者';
        var cls = isSubmitter ? 'submitter' : 'admin';
        var authorLabel = isSubmitter ? '提交者' : (n.author || '管理员');
        html += '<div class="note-item ' + cls + '">' +
          '<div class="note-header">' +
          '<span class="note-author ' + cls + '">' + escHtml(authorLabel) + '</span>' +
          '<span class="note-time">' + escHtml(formatTime(n.created_at)) + '</span>' +
          '</div>' +
          '<div class="note-content">' + escHtml(n.content) + '</div>' +
          '</div>';
      });
      notesList.innerHTML = html;
    }

    document.getElementById('detailSection').style.display = 'block';
  }

  window.doReply = function() {
    var content = document.getElementById('replyContent').value.trim();
    if (!content) {
      showReplyStatus('error', '请填写回复内容');
      return;
    }
    if (content.length > 2000) {
      showReplyStatus('error', '回复内容最多 2000 字');
      return;
    }

    var btn = document.getElementById('replyBtn');
    btn.disabled = true;

    var fd = new FormData();
    fd.append('token', currentToken);
    fd.append('content', content);
    var fileInput = document.getElementById('replyFile');
    if (fileInput && fileInput.files && fileInput.files.length > 0) {
      for (var i = 0; i < fileInput.files.length; i++) {
        if (fileInput.files[i].size > 20*1024*1024) { showReplyStatus('error', '文件 ' + fileInput.files[i].name + ' 超过 20MB'); btn.disabled = false; return; }
        fd.append('file', fileInput.files[i]);
      }
    }

    fetch('/api/v1/track/reply', {method: 'POST', body: fd})
      .then(function(r){ return r.json().then(function(d){ return {status: r.status, data: d}; }); })
      .then(function(res){
        if (res.status === 200) {
          showReplyStatus('success', '回复已提交');
          document.getElementById('replyContent').value = '';
          document.getElementById('replyFile').value = '';
          document.getElementById('fileNames').textContent = '';
          // Refresh feedback data
          setTimeout(function(){ doLookup(); }, 500);
        } else {
          showReplyStatus('error', res.data.error || '提交失败');
        }
      })
      .catch(function(){
        showReplyStatus('error', '网络错误');
      })
      .finally(function(){
        btn.disabled = false;
      });
  };

  function renderStars() {
    var box = document.getElementById('ratingStars');
    box.innerHTML = '';
    for (var i = 1; i <= 5; i++) {
      (function(n){
        var s = document.createElement('span');
        s.textContent = n <= ratingScore ? '★' : '☆';
        s.style.color = n <= ratingScore ? '#f5a623' : '#ccc';
        s.onclick = function(){ ratingScore = n; renderStars(); };
        box.appendChild(s);
      })(i);
    }
  }

  window.submitRating = function() {
    if (!ratingScore) { document.getElementById('ratingDone').textContent = '请先选择星级'; return; }
    var btn = document.getElementById('ratingBtn');
    btn.disabled = true;
    fetch('/api/v1/track/' + encodeURIComponent(currentToken) + '/rating', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ score: ratingScore, comment: document.getElementById('ratingComment').value.trim() })
    }).then(function(r){ return r.json().then(function(d){ return {status:r.status, data:d}; }); })
      .then(function(res){
        if (res.status === 200) {
          document.getElementById('ratingDone').textContent = '感谢评分：' + ratingScore + ' 星';
        } else {
          document.getElementById('ratingDone').textContent = res.data.error || '提交失败';
        }
      }).catch(function(){ document.getElementById('ratingDone').textContent = '网络错误'; })
        .finally(function(){ btn.disabled = false; });
  };

  window.voteFeedback = function() {
    var btn = document.getElementById('voteBtn');
    btn.disabled = true;
    fetch('/api/v1/feedback/' + currentId + '/vote?token=' + encodeURIComponent(currentToken), { method: 'POST' })
      .then(function(r){ return r.json(); })
      .then(function(d){
        if (d.votes != null) {
          document.getElementById('voteCount').textContent = d.votes;
          if (d.voted) btn.textContent = '👍 已投票 (' + d.votes + ')';
        }
      }).catch(function(){})
      .finally(function(){ btn.disabled = false; });
  };

  function showLookupStatus(type, msg) {
    var el = document.getElementById('lookupStatus');
    el.className = 'status ' + type;
    el.innerHTML = msg;
    el.style.display = 'block';
  }
  function hideLookupStatus() {
    document.getElementById('lookupStatus').style.display = 'none';
  }
  function showReplyStatus(type, msg) {
    var el = document.getElementById('replyStatus');
    el.className = 'status ' + type;
    el.textContent = msg;
    el.style.display = 'block';
  }

  function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }

  function formatTime(dateStr) {
    if (!dateStr) return '';
    // dateStr is "YYYY-MM-DD HH:MM:SS" from the API
    return dateStr;
  }

  // Enter key triggers lookup
  document.getElementById('tokenInput').addEventListener('keydown', function(e){
    if (e.key === 'Enter') { e.preventDefault(); doLookup(); }
  });

  // File input display
  document.getElementById('replyFile').addEventListener('change', function(){
    var names = [];
    for (var i = 0; i < this.files.length; i++) { names.push(this.files[i].name); }
    document.getElementById('fileNames').textContent = names.length ? names.join(', ') : '';
  });

  initFromHash();
})();
</script>
</body>
</html>
