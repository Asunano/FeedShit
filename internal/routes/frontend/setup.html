<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>初始设置 - FeedShit</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f5f5;color:#333;line-height:1.5}

.container{max-width:520px;margin:60px auto;padding:0 16px}
.card{background:#fff;border:1px solid #e2e2e2;border-radius:8px;padding:32px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.card h2{font-size:1.2rem;font-weight:600;margin-bottom:4px}
.card .sub{color:#888;font-size:.85rem;margin-bottom:28px}

.field{margin-bottom:18px}
.field label{display:block;font-size:.8rem;font-weight:500;color:#555;margin-bottom:4px}
.field input{width:100%;padding:8px 10px;border:1px solid #d0d0d0;border-radius:4px;font-size:.9rem}
.field input:focus{outline:none;border-color:#888}
.field .hint{font-size:.75rem;color:#999;margin-top:2px}

.btn{display:block;width:100%;padding:12px;background:#333;color:#fff;border:none;border-radius:4px;font-size:.95rem;cursor:pointer;transition:background .15s;margin-top:24px}
.btn:hover{background:#555}
.btn:disabled{background:#aaa;cursor:not-allowed}

.error{color:#c00;font-size:.8rem;margin-top:8px;display:none}
.success-msg{text-align:center;padding:24px}
.success-msg h3{font-size:1.1rem;margin-bottom:8px;color:#1a7a1a}
.success-msg p{color:#666;font-size:.9rem}
.success-msg a{display:inline-block;margin-top:16px;padding:10px 24px;background:#333;color:#fff;border-radius:4px;text-decoration:none}
.key-notice{margin-top:20px;padding:14px;background:#fff8e1;border:1px solid #f0d060;border-radius:6px;text-align:left;font-size:.82rem}
.key-notice strong{color:#8a6d00}
.key-notice p{margin:6px 0;color:#6b5900}
.key-notice code{background:#f5f0d0;padding:2px 6px;border-radius:3px;font-size:.8rem}
</style>
</head>
<body>

<div class="container">
  <div class="card" id="setupCard">
    <h2>初始设置</h2>
    <p class="sub">首次使用 FeedShit，请创建管理员账户</p>

    <form id="setupForm">
      <div class="field">
        <label>管理员用户名 *</label>
        <input type="text" id="adminUser" required minlength="2" placeholder="admin" value="admin">
      </div>
      <div class="field">
        <label>管理员密码 *</label>
        <input type="password" id="adminPwd" required minlength="8" placeholder="至少 8 位，含大小写和数字">
        <div class="hint">密码将使用 bcrypt 加密存储</div>
      </div>
      <div class="field">
        <label>确认密码 *</label>
        <input type="password" id="adminPwdConfirm" required minlength="8" placeholder="再次输入密码">
      </div>

      <div class="error" id="setupError"></div>
      <button type="submit" class="btn" id="setupBtn">完成设置</button>
    </form>
  </div>

  <div class="card" id="successCard" style="display:none">
    <div class="success-msg">
      <h3>设置完成</h3>
      <p>FeedShit 已准备就绪</p>
      <div class="key-notice">
        <strong>📌 重要：加密密钥备份</strong>
        <p>系统已自动生成加密密钥，用于保护 SMTP 密码和 Webhook 密钥。</p>
        <p>密钥文件位置：<code>data/key/master.key</code></p>
        <p><strong>请将此文件备份到安全位置</strong>（如密码管理器、U盘）。<br>
        如果丢失此文件，已保存的邮件密码和 Webhook 密钥将无法解密，需要重新配置。</p>
      </div>
      <a href="/">返回首页</a>
    </div>
  </div>
</div>

<script nonce="__NONCE__">
(function(){
  // Check if already setup
  fetch('/api/v1/setup/status').then(function(r){ return r.json(); }).then(function(d){
    if (d.setup_complete) {
      window.location.href = '/';
    }
  });

  // Form submit
  document.getElementById('setupForm').addEventListener('submit', function(e){
    e.preventDefault();
    var user = document.getElementById('adminUser').value.trim();
    var pwd = document.getElementById('adminPwd').value;
    var confirm = document.getElementById('adminPwdConfirm').value;
    var errEl = document.getElementById('setupError');
    var btn = document.getElementById('setupBtn');

    if (user.length < 2) {
      errEl.textContent = '用户名至少 2 个字符';
      errEl.style.display = 'block';
      return;
    }
    if (pwd !== confirm) {
      errEl.textContent = '两次输入的密码不一致';
      errEl.style.display = 'block';
      return;
    }
    if (pwd.length < 8) {
      errEl.textContent = '密码长度不能少于 8 位';
      errEl.style.display = 'block';
      return;
    }
    if (!/[A-Z]/.test(pwd)) {
      errEl.textContent = '密码须包含至少一个大写字母';
      errEl.style.display = 'block';
      return;
    }
    if (!/[a-z]/.test(pwd)) {
      errEl.textContent = '密码须包含至少一个小写字母';
      errEl.style.display = 'block';
      return;
    }
    if (!/[0-9]/.test(pwd)) {
      errEl.textContent = '密码须包含至少一个数字';
      errEl.style.display = 'block';
      return;
    }

    var body = {
      admin_username: user,
      admin_password: pwd
    };

    btn.disabled = true;
    btn.textContent = '保存中...';
    errEl.style.display = 'none';

    fetch('/api/v1/setup', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    }).then(function(r){ return r.json(); }).then(function(d){
      if (d.message) {
        document.getElementById('setupCard').style.display = 'none';
        document.getElementById('successCard').style.display = 'block';
      } else {
        errEl.textContent = d.error || '设置失败';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '完成设置';
      }
    }).catch(function(){
      errEl.textContent = '网络错误';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = '完成设置';
    });
  });
})();
</script>
</body>
</html>
