<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FeedShit - 登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f5f5;display:flex;justify-content:center;align-items:center;min-height:100vh}
.login-card{background:#fff;border:1px solid #e2e2e2;border-radius:6px;padding:32px;width:340px}
h2{font-size:1.2rem;margin-bottom:20px;text-align:center;color:#333}
.field{margin-bottom:14px}
.field label{display:block;font-size:.8rem;color:#666;margin-bottom:3px}
.field input{width:100%;padding:8px 10px;border:1px solid #d0d0d0;border-radius:4px;font-size:.9rem}
.field input:focus{outline:none;border-color:#888}
.btn{display:block;width:100%;padding:9px;background:#333;color:#fff;border:none;border-radius:4px;font-size:.9rem;cursor:pointer;margin-top:6px}
.btn:hover{background:#555}
.error{color:#c00;font-size:.8rem;text-align:center;margin-top:10px;display:none}
</style>
</head>
<body>
<div class="login-card">
  <h2>FeedShit 管理后台</h2>
  <form id="loginForm">
    <div class="field">
      <label>用户名</label>
      <input type="text" id="username" required autofocus>
    </div>
    <div class="field">
      <label>密码</label>
      <input type="password" id="password" required>
    </div>
    <button type="submit" class="btn">登录</button>
    <div class="error" id="errorMsg"></div>
  </form>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async function(e){
  e.preventDefault();
  var errEl = document.getElementById('errorMsg');
  errEl.style.display = 'none';
  try {
    var resp = await fetch('/api/v1/admin/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      })
    });
    var data = await resp.json();
    if (resp.ok) {
      window.location.href = '/admin';
    } else {
      errEl.textContent = data.error || '登录失败';
      errEl.style.display = 'block';
    }
  } catch(err) {
    errEl.textContent = '网络错误';
    errEl.style.display = 'block';
  }
});
</script>
</body>
</html>
