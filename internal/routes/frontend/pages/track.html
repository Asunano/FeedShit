{{template "chrometop" .}}
<style>
*{margin:0;padding:0;box-sizing:border-box}
/* Theme tokens 现由 /shared/tokens.css 统一提供（单一来源） */
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);line-height:1.6}
.container{max-width:600px;margin:40px auto;padding:0 16px}
h1{font-size:1.4rem;font-weight:600;margin-bottom:6px}
.subtitle{color:var(--muted);font-size:.85rem;margin-bottom:24px}
.card{margin-bottom:16px}
.field{margin-bottom:16px}
.field label{display:block;font-size:.85rem;font-weight:500;margin-bottom:4px;color:var(--muted)}
.field input[type=text],.field textarea{width:100%;padding:8px 10px;border:1px solid var(--input-border);border-radius:4px;font-size:.9rem;font-family:inherit;background:var(--field-input-bg);color:var(--fg);transition:border-color .15s}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--muted)}
.field textarea{resize:vertical;min-height:80px}
.btn{display:inline-block;padding:10px 24px;background:var(--primary);color:var(--primary-fg);border:none;border-radius:4px;font-size:.9rem;cursor:pointer;transition:background .15s}
.btn:hover{background:var(--hover)}
.btn:disabled{background:var(--status-closed-bg);color:var(--tag-fg);cursor:not-allowed}
.btn-sm{padding:6px 16px;font-size:.8rem}
.status{margin-top:12px;padding:10px;border-radius:4px;font-size:.85rem;display:none}
.status.success{display:block;background:var(--success-bg);color:var(--success-fg);border:1px solid var(--success-border)}
.status.error{display:block;background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-border)}
/* Lookup form */
.lookup-section{text-align:center}
.lookup-section .token-input{display:flex;gap:8px;max-width:400px;margin:0 auto}
.lookup-section .token-input input{flex:1}
/* Feedback detail */
.fb-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.fb-header h2{font-size:1.1rem;font-weight:600;flex:1}
.fb-status{display:inline-block;padding:3px 10px;border-radius:12px;font-size:.75rem;font-weight:500;white-space:nowrap}
.fb-status.pending{background:var(--status-pending-bg);color:var(--status-pending-fg)}
.fb-status.processing{background:var(--status-processing-bg);color:var(--status-processing-fg)}
.fb-status.resolved{background:var(--status-resolved-bg);color:var(--status-resolved-fg)}
.fb-status.closed{background:var(--status-closed-bg);color:var(--status-closed-fg)}
.fb-meta{font-size:.8rem;color:var(--muted);margin-bottom:16px}
.fb-desc{font-size:.9rem;color:var(--fg);white-space:pre-wrap;margin-bottom:20px;padding:12px;background:var(--note-bg);border-radius:4px;border:1px solid var(--note-border)}
/* Notes timeline */
.notes-section h3{font-size:.9rem;font-weight:600;margin-bottom:12px;color:var(--muted)}
.note-item{padding:12px;margin-bottom:8px;border-radius:6px;border:1px solid var(--note-border);background:var(--note-bg)}
.note-item.admin{background:var(--note-admin-bg);border-color:var(--note-admin-border)}
.note-item.submitter{background:var(--note-bg);border-color:var(--note-border)}
.note-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.note-author{font-size:.8rem;font-weight:600;color:var(--muted)}
.note-author.admin{color:var(--status-processing-fg)}
.note-author.submitter{color:var(--muted)}
.note-time{font-size:.7rem;color:var(--muted)}
.note-content{font-size:.85rem;color:var(--fg);white-space:pre-wrap}
.no-notes{text-align:center;color:var(--muted);font-size:.85rem;padding:20px 0}
/* Reply form */
.reply-section{margin-top:20px;padding-top:16px;border-top:1px solid var(--note-border)}
.reply-section h3{font-size:.9rem;font-weight:600;margin-bottom:12px;color:var(--muted)}
.reply-form textarea{margin-bottom:8px}
.reply-form .file-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.reply-form .file-row input[type=file]{font-size:.8rem}
.reply-form .btn-row{display:flex;justify-content:flex-end;gap:8px}
/* Dark mode toggle 定位由 components.css 的 .theme-toggle--float 提供 */
/* Loading */
.loading{text-align:center;padding:40px;color:var(--muted)}
.loading .spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border-soft);border-top-color:var(--muted);border-radius:50%;animation:spin .6s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}
/* ===== Dark mode surface repaint ===== */
[data-theme="dark"] body{background:var(--bg);color:var(--fg)}
[data-theme="dark"] a{color:var(--link)}
[data-theme="dark"] .btn{background:var(--primary);color:var(--primary-fg)}
[data-theme="dark"] .btn:hover{background:var(--hover)}
[data-theme="dark"] .btn:disabled{background:var(--status-closed-bg);color:var(--tag-fg)}
[data-theme="dark"] .status.success{background:var(--success-bg);color:var(--success-fg);border-color:var(--success-border)}
[data-theme="dark"] .status.error{background:var(--danger-bg);color:var(--danger);border-color:var(--danger-border)}
[data-theme="dark"] .loading .spinner{border-color:var(--input-border);border-top-color:var(--muted-2)}
[data-theme="dark"] .rating-label{color:var(--muted)}
[data-theme="dark"] .rating-comment{background:var(--panel);color:var(--fg);border:1px solid var(--input-border)}
.rating-label{font-size:.8rem;color:var(--tag-fg);margin-bottom:4px}
.rating-comment{border:1px solid var(--input-border);background:var(--panel);color:var(--fg)}
.vote-btn{padding:6px 14px;background:var(--panel);color:var(--fg);border:1px solid var(--input-border);border-radius:4px;font-size:.85rem;cursor:pointer;transition:background .15s,opacity .15s}
.vote-btn:hover{background:var(--note-bg)}
.vote-btn:disabled{opacity:.6;cursor:not-allowed}
.file-hint{font-size:.75rem;color:var(--muted);margin:4px 0 0}
</style>
<div class="container">
  <h1>反馈跟踪</h1>
  <p class="subtitle">输入跟踪令牌查看反馈处理进度</p>

  <!-- Lookup form -->
  <div class="card lookup-section" id="lookupCard">
    <div class="field">
      <label for="tokenInput">跟踪令牌</label>
      <div class="token-input">
        <input type="text" id="tokenInput" placeholder="粘贴您的跟踪令牌" autocomplete="off">
        <button class="btn" id="lookupBtn" data-click="doLookup" data-args="">查询</button>
      </div>
    </div>
    <div class="status" id="lookupStatus"></div>
  </div>

  <!-- Email portal: list all feedback submitted under an email address -->
  <div class="card" id="emailPortalCard" style="margin-top:16px">
    <details>
      <summary style="cursor:pointer;font-weight:600">按邮箱查看我提交的全部反馈</summary>
      <p style="font-size:.8rem;color:var(--muted);margin:8px 0">输入提交反馈时填写的邮箱，列出你名下的反馈（点击可打开对应跟踪页）。</p>
      <div class="field">
        <label for="emailLookupInput">邮箱</label>
        <div style="display:flex;gap:8px">
          <input type="email" id="emailLookupInput" placeholder="你提交反馈时填写的邮箱" style="flex:1">
          <button class="btn btn-sm" id="emailLookupBtn" data-click="lookupByEmail" data-args="">查询</button>
        </div>
      </div>
      <div class="status" id="emailLookupStatus"></div>
      <div id="emailResults"></div>
    </details>
  </div>

  <!-- Feedback detail (hidden until lookup) -->
  <div id="detailSection" style="display:none">
    <div class="card">
      <div class="fb-header">
        <h2 id="fbTitle"></h2>
        <span class="fb-status" id="fbStatus"></span>
      </div>
      <div class="fb-meta">
        编号 #<span id="fbId"></span> &middot;
        项目 <span id="fbProject"></span> &middot;
        提交于 <span id="fbDate"></span>
      </div>
      <div class="fb-desc" id="fbDesc"></div>
      <div class="fb-vote" id="fbVote" style="margin-top:10px;display:none">
        <button class="vote-btn" id="voteUsefulBtn" data-click="voteFeedback" data-args="useful">👍 有用 (<span id="voteUsefulCount">0</span>)</button>
        <button class="vote-btn" id="voteEncounteredBtn" style="margin-left:8px" data-click="voteFeedback" data-args="encountered">🤝 也遇到 (<span id="voteEncounteredCount">0</span>)</button>
      </div>
      <div id="needHelpWrap" style="margin-top:12px;display:none">
        <button class="btn btn-sm" id="needHelpBtn" data-click="needHelp" data-args="">仍需帮助</button>
        <span id="needHelpStatus" style="font-size:.8rem;margin-left:8px"></span>
      </div>
      <div class="fb-rating" id="fbRating" style="margin-top:12px;display:none">
        <div class="rating-label">为本次服务评分：</div>
        <div id="ratingStars" style="font-size:1.4rem;cursor:pointer"></div>
        <textarea id="ratingComment" class="rating-comment" placeholder="说点什么（选填）..." style="width:100%;margin-top:6px;padding:6px;border-radius:6px;font-size:.85rem"></textarea>
        <button class="btn btn-sm" id="ratingBtn" data-click="submitRating" data-args="" style="margin-top:6px">提交评分</button>
        <span id="ratingDone" style="color:var(--online);font-size:.8rem;margin-left:8px"></span>
      </div>
    </div>

    <div class="card">
      <div class="notes-section">
        <h3>处理记录与回复</h3>
        <div id="notesList"></div>
      </div>
      <div class="reply-section">
        <h3>补充回复</h3>
        <div class="reply-form">
          <textarea id="replyContent" placeholder="如有补充信息请在此填写..."></textarea>
          <div class="file-row">
            <input type="file" id="replyFile" multiple accept="image/*,.pdf,.doc,.docx,.txt,.log,.csv,.json,.zip">
            <span id="fileNames" style="font-size:.75rem;color:var(--muted)"></span>
          </div>
          <p class="file-hint">支持图片/PDF/Word/文本/日志/压缩包，单文件最大 20MB（选填）</p>
          <div class="btn-row">
            <button class="btn btn-sm" id="replyBtn" data-click="doReply" data-args="">提交回复</button>
          </div>
          <div class="status" id="replyStatus"></div>
        </div>
      </div>
    </div>
    <div class="card" id="historyCard" style="display:none">
      <div class="notes-section">
        <h3>状态变更记录</h3>
        <div id="historyList"></div>
      </div>
    </div>
  </div>
</div>

<script nonce="{{.Nonce}}">
(function(){
  var statusLabels = {pending:'待处理',processing:'处理中',resolved:'已解决',closed:'已关闭'};
  var currentToken = '';
  var currentId = 0;
  var ratingScore = 0;

  // 主题（亮 / 暗 / 跟随系统）由 /shared/theme.js 统一管理

  // Check URL hash for token
  function initFromHash() {
    var hash = window.location.hash;
    if (hash && hash.startsWith('#token=')) {
      var token = decodeURIComponent(hash.substring(7));
      if (token) {
        document.getElementById('tokenInput').value = token;
        doLookup();
      }
    }
  }

  function escHtml(s){ var d = document.createElement('div'); d.textContent = s == null ? '' : s; return d.innerHTML; }
  window.lookupByEmail = function() {
    var email = document.getElementById('emailLookupInput').value.trim();
    var status = document.getElementById('emailLookupStatus');
    var results = document.getElementById('emailResults');
    if (!email) { status.className = 'status error'; status.textContent = '请输入邮箱'; status.style.display = 'block'; return; }
    status.className = 'status loading'; status.innerHTML = '<div class="loading"><div class="spinner"></div></div>'; status.style.display = 'block';
    results.innerHTML = '';
    fetch('/api/v1/track/by-email?email=' + encodeURIComponent(email))
      .then(function(r){ return r.json().then(function(d){ return {status: r.status, data: d}; }); })
      .then(function(res){
        if (res.status === 200) {
          status.style.display = 'none';
          var items = res.data.items || [];
          if (!items.length) { results.innerHTML = '<p class="no-notes">该邮箱暂无任何反馈记录。</p>'; return; }
          results.innerHTML = items.map(function(it){
            return '<div class="note-item" style="margin-top:8px"><div style="display:flex;justify-content:space-between;align-items:center;gap:8px">' +
              '<a href="/track#token=' + encodeURIComponent(it.token) + '" style="font-weight:600">#' + it.id + ' ' + escHtml(it.title) + '</a>' +
              '<span class="fb-status ' + escHtml(it.status) + '">' + (statusLabels[it.status] || it.status) + '</span></div>' +
              '<div class="note-time">更新于 ' + escHtml(it.updated_at) + '</div></div>';
          }).join('');
        } else {
          status.className = 'status error'; status.textContent = (res.data && res.data.error) || '查询失败'; status.style.display = 'block';
        }
      })
      .catch(function(){ status.className = 'status error'; status.textContent = '网络错误，请稍后重试'; status.style.display = 'block'; });
  };

  window.doLookup = function() {
    var token = document.getElementById('tokenInput').value.trim();
    if (!token) {
      showLookupStatus('error', '请输入跟踪令牌');
      return;
    }
    currentToken = token;
    loadFeedback(false);
  };

  // loadFeedback fetches feedback and renders it. When silent=true it refreshes
  // in place (notes/status) without hiding the detail panel, so the page does
  // not jump to the top after a reply (#5).
  function loadFeedback(silent) {
    if (!silent) {
      document.getElementById('detailSection').style.display = 'none';
      showLookupStatus('loading', '<div class="loading"><div class="spinner"></div><div>正在查询...</div></div>');
    }
    fetch('/api/v1/track/feedback?token=' + encodeURIComponent(currentToken))
      .then(function(r){ return r.json().then(function(d){ return {status: r.status, data: d}; }); })
      .then(function(res){
        if (res.status === 200) {
          if (!silent) hideLookupStatus();
          renderFeedback(res.data);
        } else {
          if (!silent) showLookupStatus('error', res.data.error || '查询失败');
          else showReplyStatus('error', res.data.error || '刷新失败');
        }
      })
      .catch(function(){
        if (!silent) showLookupStatus('error', '网络错误，请稍后重试');
      });
  }

  function renderFeedback(data) {
    document.getElementById('fbId').textContent = data.id;
    document.getElementById('fbTitle').textContent = data.title;
    document.getElementById('fbProject').textContent = data.project_id;
    document.getElementById('fbDate').textContent = data.created_at;

    var statusEl = document.getElementById('fbStatus');
    statusEl.textContent = statusLabels[data.status] || data.status;
    statusEl.className = 'fb-status ' + (data.status || '');

    var desc = data.description || '（无详细描述）';
    document.getElementById('fbDesc').textContent = desc;
    currentId = data.id;

    // Vote display (two dimensions: useful / encountered)
    var voteBox = document.getElementById('fbVote');
    if (data.useful_votes != null || data.encountered_votes != null) {
      voteBox.style.display = 'block';
      markVoted('useful', 'voteUsefulBtn', 'voteUsefulCount', data.useful_votes || 0);
      markVoted('encountered', 'voteEncounteredBtn', 'voteEncounteredCount', data.encountered_votes || 0);
    } else {
      voteBox.style.display = 'none';
    }

    // Need-help button (only when resolved/closed)
    var needHelpWrap = document.getElementById('needHelpWrap');
    if (data.status === 'resolved' || data.status === 'closed') {
      needHelpWrap.style.display = 'block';
    } else {
      needHelpWrap.style.display = 'none';
    }

    // Status change history timeline (#9)
    var hist = data.status_history || [];
    var historyCard = document.getElementById('historyCard');
    if (hist.length) {
      historyCard.style.display = 'block';
      document.getElementById('historyList').innerHTML = hist.map(function(h){
        return '<div class="note-item" style="margin-bottom:6px"><div class="note-time">' + escHtml(h.created_at) + '</div>' +
          '<div class="note-content">状态从 ' + (statusLabels[h.from_status] || h.from_status) + ' 变为 ' + (statusLabels[h.to_status] || h.to_status) +
          (h.changed_by ? (' · ' + escHtml(h.changed_by)) : '') + (h.note ? (' · ' + escHtml(h.note)) : '') + '</div></div>';
      }).join('');
    } else {
      historyCard.style.display = 'none';
    }

    // Rating (CSAT) — only when resolved
    var ratingBox = document.getElementById('fbRating');
    if (data.allow_rating) {
      ratingBox.style.display = 'block';
      renderStars();
      document.getElementById('ratingComment').value = '';
      document.getElementById('ratingDone').textContent = data.rating ? ('您已评分：' + data.rating + ' 星') : '';
    } else {
      ratingBox.style.display = 'none';
    }

    // Render notes
    var notesList = document.getElementById('notesList');
    var notes = data.notes || [];
    if (notes.length === 0) {
      notesList.innerHTML = '<div class="no-notes">暂无回复记录</div>';
    } else {
      var html = '';
      notes.forEach(function(n){
        var isSubmitter = n.author === '提交者';
        var cls = isSubmitter ? 'submitter' : 'admin';
        var authorLabel = isSubmitter ? '提交者' : (n.author || '管理员');
        var fileHtml = '';
        try {
          var fps = JSON.parse(n.file_paths || '[]');
          if (fps.length) {
            fileHtml = '<div class="note-files">';
            for (var fi = 0; fi < fps.length; fi++) {
              var fname = fps[fi].split('/').pop();
              fileHtml += '<a class="file-chip" href="/api/v1/track/file?token=' + encodeURIComponent(currentToken) + '&note=' + n.id + '&i=' + fi + '" target="_blank" rel="noopener" style="display:inline-block;margin:6px 6px 0 0;padding:4px 10px;background:var(--panel);border:1px solid var(--border);border-radius:8px;color:var(--accent);text-decoration:none;font-size:.8rem">' + escHtml(fname) + '</a>';
            }
            fileHtml += '</div>';
          }
        } catch(e) {}
        html += '<div class="note-item ' + cls + '">' +
          '<div class="note-header">' +
          '<span class="note-author ' + cls + '">' + escHtml(authorLabel) + '</span>' +
          '<span class="note-time">' + escHtml(formatTime(n.created_at)) + '</span>' +
          '</div>' +
          '<div class="note-content">' + escHtml(n.content) + '</div>' +
          fileHtml +
          '</div>';
      });
      notesList.innerHTML = html;
    }

    document.getElementById('detailSection').style.display = 'block';
  }

  window.doReply = function() {
    var content = document.getElementById('replyContent').value.trim();
    var replyFileEl = document.getElementById('replyFile');
    var hasFile = replyFileEl && replyFileEl.files && replyFileEl.files.length > 0;
    if (!content && !hasFile) {
      showReplyStatus('error', '请填写回复内容或添加附件');
      return;
    }
    if (content.length > 2000) {
      showReplyStatus('error', '回复内容最多 2000 字');
      return;
    }

    var btn = document.getElementById('replyBtn');
    btn.disabled = true;

    var fd = new FormData();
    fd.append('token', currentToken);
    fd.append('content', content);
    var fileInput = document.getElementById('replyFile');
    if (fileInput && fileInput.files && fileInput.files.length > 0) {
      for (var i = 0; i < fileInput.files.length; i++) {
        if (fileInput.files[i].size > 20*1024*1024) { showReplyStatus('error', '文件 ' + fileInput.files[i].name + ' 超过 20MB'); btn.disabled = false; return; }
        fd.append('file', fileInput.files[i]);
      }
    }

    fetch('/api/v1/track/reply', {method: 'POST', body: fd})
      .then(function(r){ return r.json().then(function(d){ return {status: r.status, data: d}; }); })
      .then(function(res){
        if (res.status === 200) {
          showReplyStatus('success', '回复已提交');
          document.getElementById('replyContent').value = '';
          document.getElementById('replyFile').value = '';
          document.getElementById('fileNames').textContent = '';
          // 仅局部刷新备注区，不滚动页面（#5）
          loadFeedback(true);
        } else {
          showReplyStatus('error', res.data.error || '提交失败');
        }
      })
      .catch(function(){
        showReplyStatus('error', '网络错误');
      })
      .finally(function(){
        btn.disabled = false;
      });
  };

  function renderStars() {
    var box = document.getElementById('ratingStars');
    box.innerHTML = '';
    for (var i = 1; i <= 5; i++) {
      (function(n){
        var s = document.createElement('span');
        s.textContent = n <= ratingScore ? '★' : '☆';
        s.style.color = n <= ratingScore ? '#f5a623' : '#ccc';
        s.onclick = function(){ ratingScore = n; renderStars(); };
        box.appendChild(s);
      })(i);
    }
  }

  window.submitRating = function() {
    if (!ratingScore) { document.getElementById('ratingDone').textContent = '请先选择星级'; return; }
    var btn = document.getElementById('ratingBtn');
    btn.disabled = true;
    fetch('/api/v1/track/' + encodeURIComponent(currentToken) + '/rating', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ score: ratingScore, comment: document.getElementById('ratingComment').value.trim() })
    }).then(function(r){ return r.json().then(function(d){ return {status:r.status, data:d}; }); })
      .then(function(res){
        if (res.status === 200) {
          document.getElementById('ratingDone').textContent = '感谢评分：' + ratingScore + ' 星';
        } else {
          document.getElementById('ratingDone').textContent = res.data.error || '提交失败';
        }
      }).catch(function(){ document.getElementById('ratingDone').textContent = '网络错误'; })
        .finally(function(){ btn.disabled = false; });
  };

  window.voteFeedback = function(type) {
    var btn = document.getElementById(type === 'useful' ? 'voteUsefulBtn' : 'voteEncounteredBtn');
    btn.disabled = true;
    fetch('/api/v1/feedback/' + currentId + '/vote?token=' + encodeURIComponent(currentToken) + '&type=' + encodeURIComponent(type), { method: 'POST' })
      .then(function(r){ return r.json(); })
      .then(function(d){
        if (d.votes != null) {
          document.getElementById(type === 'useful' ? 'voteUsefulCount' : 'voteEncounteredCount').textContent = d.votes;
          btn.textContent = (type === 'useful' ? '👍 已投票 ' : '🤝 已遇到 ') + '(' + d.votes + ')';
          btn.disabled = true;
          localStorage.setItem('voted_' + currentId + '_' + type, '1');
        }
      })
      .catch(function(){ btn.disabled = false; });
  };

  // Mark a vote button with its count; if this browser already voted, show the
  // disabled "已投票/已遇到" state (#7).
  function markVoted(type, btnId, countId, count) {
    document.getElementById(countId).textContent = count;
    var btn = document.getElementById(btnId);
    if (localStorage.getItem('voted_' + currentId + '_' + type) === '1') {
      btn.disabled = true;
      btn.textContent = (type === 'useful' ? '👍 已投票 ' : '🤝 已遇到 ') + '(' + count + ')';
    }
  }

  // needHelp reverts a resolved/closed feedback to processing (#6).
  window.needHelp = function() {
    if (!confirm('确认标记为「仍需帮助」？反馈状态将回退为「处理中」。')) return;
    var st = document.getElementById('needHelpStatus');
    st.textContent = '提交中...';
    st.style.color = 'var(--muted)';
    fetch('/api/v1/track/' + encodeURIComponent(currentToken) + '/need-help', { method: 'POST' })
      .then(function(r){ return r.json().then(function(d){ return {s: r.status, d: d}; }); })
      .then(function(res){
        if (res.s === 200) {
          st.style.color = 'var(--online)';
          st.textContent = '已标记，状态回退为处理中';
          loadFeedback(true);
        } else {
          st.style.color = 'var(--danger)';
          st.textContent = (res.d && res.d.error) || '操作失败';
        }
      })
      .catch(function(){ st.style.color = 'var(--danger)'; st.textContent = '网络错误'; });
  };

  function showLookupStatus(type, msg) {
    var el = document.getElementById('lookupStatus');
    el.className = 'status ' + type;
    el.innerHTML = msg;
    el.style.display = 'block';
  }
  function hideLookupStatus() {
    document.getElementById('lookupStatus').style.display = 'none';
  }
  function showReplyStatus(type, msg) {
    var el = document.getElementById('replyStatus');
    el.className = 'status ' + type;
    el.textContent = msg;
    el.style.display = 'block';
  }

  function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }

  function formatTime(dateStr) {
    if (!dateStr) return '';
    // dateStr is "YYYY-MM-DD HH:MM:SS" from the API
    return dateStr;
  }

  // Enter key triggers lookup
  document.getElementById('tokenInput').addEventListener('keydown', function(e){
    if (e.key === 'Enter') { e.preventDefault(); doLookup(); }
  });

  // File input display
  document.getElementById('replyFile').addEventListener('change', function(){
    var names = [];
    for (var i = 0; i < this.files.length; i++) { names.push(this.files[i].name); }
    document.getElementById('fileNames').textContent = names.length ? names.join(', ') : '';
  });

  initFromHash();



})();
</script>
{{template "chromebot" .}}
