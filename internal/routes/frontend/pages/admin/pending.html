{{define "adminPending"}}
<div id="tab-pending" style="display:none">
    <div class="filter-bar">
      <select id="pendingProjectFilter"><option value="">全部项目</option></select>
      <input type="text" id="pendingKeyword" placeholder="搜索标题/描述...">
      <span class="count" id="pendingCount"></span>
      <span class="spacer"></span>
      <button class="btn-sm" data-click="loadPending" data-args="">刷新</button>
    </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th class="cb-col"><input type="checkbox" id="pendingSelectAll" data-change="togglePendingSelectAll" data-args="this.checked"></th><th>ID</th><th>项目</th><th>标题</th><th>优先级</th><th>时间</th><th></th></tr></thead>
          <tbody id="pendingTable"><tr><td colspan="7" class="empty">加载中...</td></tr></tbody>
        </table>
      </div>
    </div>
{{end}}
