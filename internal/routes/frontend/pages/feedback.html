{{template "chrometop" .}}
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);line-height:1.6}
.container{max-width:560px;margin:40px auto;padding:0 16px}
h1{font-size:1.4rem;font-weight:600;margin-bottom:6px}
.subtitle{color:var(--muted);font-size:.85rem;margin-bottom:24px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:24px}
.field{margin-bottom:16px}
.field > label{display:block;font-size:.85rem;font-weight:600;margin-bottom:4px;color:var(--fg)}
.field .req{color:var(--danger);margin-left:2px}
.field input[type=text],.field input[type=email],.field input[type=url],.field input[type=tel],
.field input[type=number],.field input[type=date],.field input[type=time],.field input[type=datetime-local],
.field input[type=month],.field input[type=color],.field input[type=password],
.field textarea,.field select{
  width:100%;padding:9px 10px;border:1px solid var(--border-soft);border-radius:4px;
  font-size:.9rem;box-sizing:border-box;background:var(--panel);color:var(--field-fg);
  transition:border-color .15s,box-shadow .15s
}
.field input:focus,.field textarea:focus,.field select:focus{
  outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(229,62,62,.15)
}
.field textarea{resize:vertical}
.checkbox-group,.radio-group{display:flex;flex-direction:column;gap:6px}
.checkbox-group label,.radio-group label{display:flex;align-items:center;gap:6px;font-weight:400;cursor:pointer;font-size:.85rem}
.checkbox-group input,.radio-group input{width:auto;margin:0}
.field-error{color:var(--danger);font-size:.78rem;margin-top:4px;min-height:0}
.field-error.visible{margin-top:4px}
.help-text{font-size:.75rem;color:var(--muted);margin-top:4px;margin-bottom:0}
.char-counter{font-size:.7rem;color:var(--hint);text-align:right;margin-top:2px}

/* File areas */
.file-area{margin-bottom:16px}
.file-area .label{font-size:.85rem;font-weight:500;margin-bottom:4px;color:var(--field-label)}
.file-input-wrap{position:relative;border:1px dashed var(--border-muted);border-radius:4px;padding:12px;text-align:center;cursor:pointer;transition:border-color .15s}
.file-input-wrap:hover{border-color:var(--muted)}
.file-input-wrap input{position:absolute;inset:0;opacity:0;cursor:pointer}
.file-input-wrap .hint{color:var(--hint);font-size:.8rem}
.preview-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.preview-item{position:relative;width:96px;height:96px;border:1px solid var(--border-soft);border-radius:4px;overflow:hidden;background:var(--subtle);cursor:zoom-in}
.preview-item img{width:100%;height:100%;object-fit:cover}
.preview-item .preview-name{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);color:var(--primary-fg);font-size:.55rem;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:1px 2px}
.preview-item .preview-remove{position:absolute;top:1px;right:1px;width:18px;height:18px;background:rgba(180,0,0,.75);color:var(--primary-fg);border:none;border-radius:50%;font-size:.7rem;line-height:18px;text-align:center;cursor:pointer;display:none}
.preview-item:hover .preview-remove{display:block}
.file-list{margin-top:8px;font-size:.8rem;color:var(--tag-fg)}
.file-list .item{display:flex;justify-content:space-between;align-items:center;padding:3px 0}
.file-list .item .remove{color:var(--danger);cursor:pointer;font-size:.75rem}

.project-badge{display:inline-block;background:var(--note-border);padding:2px 8px;border-radius:3px;font-size:.8rem;color:var(--tag-fg);font-family:monospace}
.btn{display:block;width:100%;padding:10px;background:var(--primary);color:var(--primary-fg);border:none;border-radius:4px;font-size:.9rem;cursor:pointer;transition:background .15s}
.btn:hover{background:var(--field-label)}
.btn:disabled{background:var(--disabled);cursor:not-allowed}
.status{margin-top:12px;padding:10px;border-radius:4px;font-size:.85rem;display:none}
.status.success{display:block;background:var(--success-bg);color:var(--success-fg);border:1px solid var(--success-border)}
.status.error{display:block;background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-border)}
.status.loading{display:block;background:var(--amber-bg);color:var(--status-pending-fg);border:1px solid var(--amber-border)}
/* PoW progress */
.pow-indicator{margin-top:8px;font-size:.8rem;color:var(--hint);display:none}
.pow-indicator.active{display:block}
.pow-bar{height:3px;background:var(--border-soft);border-radius:2px;margin-top:4px;overflow:hidden}
.pow-bar-inner{height:100%;background:var(--muted);width:0%;transition:width .3s}
/* Success card */
.success-card{text-align:center;padding:20px 0}
.success-card .check{font-size:2.5rem;color:var(--online);margin-bottom:8px}
.success-card .fb-id{font-size:1.1rem;font-weight:600;color:var(--fg);margin-bottom:4px}
.success-card .fb-note{font-size:.8rem;color:var(--muted);margin-bottom:16px}
.success-card .btn-new{display:inline-block;padding:8px 24px;background:var(--hover);color:var(--field-label);border:1px solid var(--border-soft);border-radius:4px;font-size:.85rem;cursor:pointer}
.success-card .btn-new:hover{background:var(--border-soft)}
/* Privacy notice */
.privacy-notice{margin-top:16px;padding:10px 12px;background:var(--note-bg);border:1px solid var(--note-border);border-radius:4px;font-size:.75rem;color:var(--hint);line-height:1.5}
.privacy-notice strong{color:var(--disabled)}
/* Duplicate warning */
.dup-warning{margin-top:8px;padding:8px 10px;background:var(--status-pending-bg);color:var(--status-pending-fg);border:1px solid var(--amber-border);border-radius:4px;font-size:.8rem;display:none}
.dup-warning.visible{display:block}
.faq-hint-title{font-weight:600;margin-bottom:4px}
.faq-item{margin:4px 0}
.faq-q{color:var(--amber-fg);text-decoration:none;cursor:pointer;font-weight:500}
.faq-q:hover{text-decoration:underline}
.faq-a{margin:4px 0 6px;padding:6px 8px;background:rgba(0,0,0,.03);border-radius:4px;white-space:pre-wrap;word-break:break-word}
.faq-still{margin-top:6px;text-align:right}
.faq-still a{color:var(--amber-fg);font-weight:600;text-decoration:none}
.faq-still a:hover{text-decoration:underline}
[data-theme="dark"] .faq-q,[data-theme="dark"] .faq-still a{color:var(--status-pending-fg)}
[data-theme="dark"] .faq-a{background:rgba(255,255,255,.06)}
/* Duplicate candidate cards */
.dup-title{font-weight:600;margin-bottom:4px}
.dup-item{margin:6px 0;padding:6px 8px;background:rgba(0,0,0,.03);border-radius:4px}
.dup-card-title{font-weight:500;color:var(--amber-fg);word-break:break-word}
.dup-card-summary{margin:2px 0 4px;color:var(--status-pending-fg);word-break:break-word;max-height:3.2em;overflow:hidden}
.dup-card-link{color:var(--amber-fg);font-weight:600;text-decoration:none}
.dup-card-link:hover{text-decoration:underline}
.dup-still{margin-top:6px;text-align:right}
.dup-still a{color:var(--amber-fg);font-weight:600;text-decoration:none}
.dup-still a:hover{text-decoration:underline}
[data-theme="dark"] .dup-card-title,[data-theme="dark"] .dup-card-link,[data-theme="dark"] .dup-still a{color:var(--status-pending-fg)}
[data-theme="dark"] .dup-item{background:rgba(255,255,255,.06)}
/* Contact modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal-overlay.active{display:flex}
.modal{background:var(--panel);border-radius:8px;padding:24px;width:90%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal h3{margin:0 0 8px 0;font-size:1.05rem}
.modal .btn{padding:8px 18px;border:1px solid var(--border-soft);border-radius:4px;background:var(--panel);cursor:pointer;font-size:.85rem}
.modal .btn-primary{background:var(--accent);color:var(--primary-fg);border-color:var(--accent)}
.modal .btn-primary:hover{background:var(--accent-hover)}
.modal .field{margin-bottom:12px}
.modal .field label{display:block;font-size:.8rem;font-weight:600;margin-bottom:4px;color:var(--fg)}
.modal .field input{width:100%;padding:8px 10px;border:1px solid var(--border-soft);border-radius:4px;font-size:.85rem;box-sizing:border-box}
.modal .field input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(229,62,62,.15)}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.modal-actions .btn{flex:1;width:auto}
[data-theme="dark"] .modal{background:var(--primary)}
[data-theme="dark"] .modal h3{color:var(--note-border)}
[data-theme="dark"] .modal .field label{color:var(--border-muted)}
[data-theme="dark"] .modal input{background:var(--field-input-bg);border-color:var(--field-label);color:var(--note-border)}
[data-theme="dark"] .modal .btn{background:var(--field-input-bg);border-color:var(--field-label);color:var(--border-soft)}

/* page head + theme toggle */
.page-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:6px}

/* ===== Responsive ===== */
@media (max-width:768px){
  .container{margin:16px auto;padding:0 12px}
  .card{padding:16px}
  .field input[type=text],.field input[type=email],.field input[type=url],.field input[type=tel],
  .field input[type=number],.field input[type=date],.field input[type=time],.field input[type=datetime-local],
  .field input[type=month],.field textarea,.field select{min-height:40px}
  .btn{min-height:44px}
  .file-input-wrap{padding:16px}
}

/* ===== Modular form schema styles ===== */
.field-half{width:50%;display:inline-block;vertical-align:top;box-sizing:border-box;padding-right:8px}
.field-third{width:33.33%;display:inline-block;vertical-align:top;box-sizing:border-box;padding-right:8px}
.rating-group{display:flex;gap:4px;padding:4px 0}
.rating-star{font-size:1.5rem;cursor:pointer;opacity:.3;transition:opacity .15s}
.rating-star.active,.rating-star:hover{opacity:1}
.toggle-switch{position:relative;display:inline-block;width:44px;height:24px;vertical-align:middle}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:var(--border-muted);border-radius:24px;transition:.2s}
.toggle-slider::before{content:"";position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:var(--panel);border-radius:50%;transition:.2s}
.toggle-switch input:checked + .toggle-slider{background:var(--link)}
.toggle-switch input:checked + .toggle-slider::before{transform:translateX(20px)}
.toggle-label{margin-left:8px;font-size:.85rem;vertical-align:middle}
.tags-input{border:1px solid var(--border-soft);border-radius:4px;padding:4px}
.tags-input input{border:none;outline:none;width:100%;padding:4px;background:transparent;color:var(--field-fg)}
.tag-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.tag-item{background:var(--tag-bg);border-radius:3px;padding:2px 6px;font-size:.8rem;display:inline-flex;align-items:center;gap:4px}
.tag-remove{cursor:pointer;font-weight:bold;color:var(--hint);font-size:.75rem}
.tag-remove:hover{color:var(--danger)}
.section-divider{margin:16px 0;padding:8px 0;border-top:1px solid var(--note-border)}
.section-title{font-size:1rem;font-weight:600;margin:0 0 4px 0;color:var(--fg)}
.section-desc{font-size:.8rem;color:var(--muted);margin:0}
.custom-html{padding:4px 0}
.md-preview{background:var(--note-bg);border:1px solid var(--border-soft)}
.paragraph{padding:6px 0;font-size:.9rem;color:var(--fg);line-height:1.6}
.paragraph code{background:var(--subtle);padding:1px 4px;border-radius:3px;font-size:.85em}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.scale-group{display:flex;flex-direction:column;gap:4px}
.scale-option{display:flex;align-items:flex-start;gap:6px;cursor:pointer;font-size:.85rem}
.scale-option input{width:auto;margin-top:3px}
.scale-option .scale-label{font-weight:400}
@media (max-width:768px){
  .field-half,.field-third{width:100%;display:block;padding-right:0}
}
/* Announcement banner */
.announcement-bar{display:flex;align-items:flex-start;gap:10px;border-radius:8px;padding:12px 14px;font-size:.9rem;border:1px solid transparent}
.announcement-bar .ann-icon{font-size:1.05rem;line-height:1.4}
.announcement-bar .ann-body{flex:1;min-width:0}
.announcement-bar .ann-body *{max-width:100%}
.announcement-bar .ann-close{background:none;border:none;color:inherit;cursor:pointer;font-size:1.1rem;opacity:.6;padding:0 2px;line-height:1}
.announcement-bar .ann-close:hover{opacity:1}
.ann-info{background:var(--accent-soft,rgba(37,99,235,.1));border-color:var(--accent-border,rgba(37,99,235,.35));color:var(--fg)}
.ann-warning{background:rgba(217,119,6,.12);border-color:rgba(217,119,6,.4);color:var(--fg)}
.ann-success{background:rgba(22,163,74,.12);border-color:rgba(22,163,74,.4);color:var(--fg)}
.ann-danger{background:rgba(220,38,38,.12);border-color:rgba(220,38,38,.4);color:var(--fg)}
</style>
<div class="container">
  <div class="page-head">
    <h1 id="pageTitle">反馈提交</h1>
  </div>
  <p class="subtitle" id="pageSubtitle">项目：<span class="project-badge" id="projectDisplay">-</span></p>
  <p style="margin:-12px 0 16px"><a href="/roadmap" id="projectRoadmapLink" style="color:var(--accent);font-size:.85rem">查看本项目路线图 →</a></p>
  <div id="projectAnnouncement"></div>
  <div id="lastTrackBanner"></div>
  <div class="card">
    <form id="feedbackForm" enctype="multipart/form-data">
      <!-- Entire form body is rendered from PROJECT.form_schema (see renderFormBySchema). -->
      <div id="formRoot"></div>

      <div class="dup-warning" id="dupWarning">检测到您可能正在重复提交相同内容的反馈。</div>
      <div class="dup-warning" id="faqHint"></div>

      <button type="submit" class="btn" id="submitBtn">提交反馈</button>
      <div class="pow-indicator" id="powIndicator">
        <span id="powText">正在计算工作量证明...</span>
        <div class="pow-bar"><div class="pow-bar-inner" id="powBar"></div></div>
      </div>
      <div class="status" id="statusMsg"></div>
    </form>

    <!-- Contact info modal -->
    <div class="modal-overlay" id="contactModal">
      <div class="modal" style="max-width:420px">
        <h3>📬 接收通知</h3>
        <p style="font-size:.85rem;color:var(--tag-fg);margin-bottom:16px">填写联系方式后，反馈状态更新或有回复时您将收到邮件通知。</p>
        <div class="field">
          <label for="modal_contact_name">您的称呼</label>
          <input type="text" id="modal_contact_name" placeholder="如何称呼您？">
        </div>
        <div class="field">
          <label for="modal_contact_email">邮箱 <span class="req">*</span></label>
          <input type="email" id="modal_contact_email" placeholder="用于接收通知和跟踪链接">
        </div>
        <div class="modal-actions">
          <button class="btn" data-click="closeContactModal" data-args="">取消</button>
          <button class="btn btn-primary" data-click="confirmContactModal" data-args="">确认</button>
        </div>
      </div>
    </div>

    <div class="privacy-notice">
      <strong>隐私说明：</strong>您提交的信息仅用于问题处理，管理员可查看全部内容。联系信息为选填项，不填则视为匿名反馈。
    </div>
  </div>
</div>
<!-- 图片预览 Lightbox（提交页：纯本地预览，无下载按钮） -->
<div class="lightbox" id="fbLightbox">
  <div class="lightbox__close" id="fbLightboxClose" aria-label="关闭">×</div>
  <img class="lightbox__img" id="fbLightboxImg" alt="预览">
  <div class="lightbox__cap" id="fbLightboxCap"></div>
</div>

<script nonce="{{.Nonce}}">
(function(){
  // Project data injected by server — unique per /fb/{slug} page.
  // NOTE: use a plain token (NOT a /* */ comment) — html/template strips JS
  // block comments, which would break the strings.Replace injection in routes.go.
  var PROJECT = __PROJECT_DATA__;
  if (!PROJECT) {
    document.body.innerHTML = '<div style="text-align:center;padding:60px;font-family:sans-serif"><h1>页面错误</h1><p>项目信息未加载</p></div>';
    return;
  }

  // Set page title and project display
  document.title = PROJECT.name + ' - 反馈提交';
  document.getElementById('pageTitle').textContent = PROJECT.name + ' 反馈';
  document.getElementById('projectDisplay').textContent = PROJECT.slug;
  var rmLink = document.getElementById('projectRoadmapLink');
  if (rmLink && PROJECT.slug) rmLink.href = '/p/' + encodeURIComponent(PROJECT.slug) + '/roadmap';
  if (PROJECT.description) {
    document.getElementById('pageSubtitle').innerHTML =
      '项目：<span class="project-badge">' + escHtml(PROJECT.slug) + '</span> ' +
      '<span style="color:var(--disabled);font-size:.8rem">' + escHtml(PROJECT.description) + '</span>';
  }

  // ---- Per-project announcement banner ----
  renderProjectAnnouncement(PROJECT.announcement);
  renderLastTrackBanner();

  function renderLastTrackBanner() {
    var el = document.getElementById('lastTrackBanner');
    if (!el) return;
    var key = 'feedshit_last_track_' + (PROJECT.slug || '');
    var url = '';
    try { url = localStorage.getItem(key) || ''; } catch(e){}
    if (!url) { el.innerHTML = ''; return; }
    el.innerHTML = '<div class="announcement-bar ann-info" style="margin:0 0 16px;align-items:center">' +
      '<span class="ann-icon">🔗</span>' +
      '<div class="ann-body">您有一条未查看的反馈跟踪链接</div>' +
      '<button type="button" id="openLastTrack" style="margin-left:8px;padding:4px 12px;background:var(--hover);color:var(--field-label);border:1px solid var(--border-soft);border-radius:4px;font-size:.8rem;cursor:pointer">查看</button>' +
      '<button type="button" id="copyLastTrack" style="padding:4px 12px;background:var(--hover);color:var(--field-label);border:1px solid var(--border-soft);border-radius:4px;font-size:.8rem;cursor:pointer">复制</button>' +
      '<button type="button" class="ann-close" id="dismissLastTrack" aria-label="忽略">×</button></div>';
    document.getElementById('openLastTrack').onclick = function(){ window.open(url, '_blank'); };
    document.getElementById('copyLastTrack').onclick = function(){ if (navigator.clipboard) navigator.clipboard.writeText(url); this.textContent = '已复制'; };
    document.getElementById('dismissLastTrack').onclick = function(){ try { localStorage.removeItem(key); } catch(e){} el.innerHTML = ''; };
  }

  function renderProjectAnnouncement(data) {
    var el = document.getElementById('projectAnnouncement');
    if (!el) return;
    if (!data || !data.enabled || !data.content) { el.innerHTML = ''; return; }
    var level = data.level || 'info';
    var bar = document.createElement('div');
    bar.className = 'announcement-bar ann-' + level;
    bar.style.margin = '0 0 16px';
    var icons = {info:'ℹ️',warning:'⚠️',success:'✅',danger:'🚫'};
    var icon = document.createElement('span');
    icon.className = 'ann-icon'; icon.textContent = icons[level] || 'ℹ️';
    var body = document.createElement('div');
    body.className = 'ann-body';
    if (data.content_type === 'html') { body.innerHTML = data.content; }
    else { body.textContent = data.content; }
    bar.appendChild(icon);
    bar.appendChild(body);
    if (data.dismissible) {
      var close = document.createElement('button');
      close.className = 'ann-close'; close.setAttribute('aria-label','关闭公告'); close.textContent = '×';
      close.addEventListener('click', function(){ bar.style.display='none'; });
      bar.appendChild(close);
    }
    el.innerHTML = '';
    el.appendChild(bar);
  }

  var categories = PROJECT.categories || [];

  // Upload size ceiling (MB). Refreshed from /api/v1/setup/status so the hint
  // always matches the server's MAX_UPLOAD_MB.
  var maxUploadMB = 20;

  // ========== Escaping / helper helpers ==========
  function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function escAttr(s) { return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function _a(s) { return escAttr(s); }
  function _e(s) { return escHtml(s); }
  function _r(f) { return f.required ? ' required' : ''; }
  function _at(n, v) { return (v !== undefined && v !== null && v !== '') ? ' ' + n + '="' + _a(String(v)) + '"' : ''; }
  function reqMark(f) { return f.required ? ' <span class="req">*</span>' : ''; }
  function mdLite(s) {
    // Lightweight inline markdown for paragraph/display fields: **b**, *i*, `code`, newlines.
    var out = escHtml(s || '');
    out = out.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    out = out.replace(/\*(.+?)\*/g, '<em>$1</em>');
    out = out.replace(/`(.+?)`/g, '<code>$1</code>');
    out = out.replace(/\n/g, '<br>');
    return out;
  }

  // ========== Field Registry — modular field type system ==========
  // Each entry: { label, render(f, fName), collect(f, fName), validate?(f, fName) }
  // Add a new type by appending an entry; no need to touch render/collect/validate.
  var FIELD_REGISTRY = {
    text: {
      render: function(f, fName) {
        return '<input type="text" id="' + fName + '" name="' + fName + '"' + _r(f) + ' placeholder="' + _a(f.placeholder||'') + '"' +
          _at('minlength', f.min_length) + _at('maxlength', f.max_length) + _at('pattern', f.pattern) + '>';
      },
      collect: function(f, fName) { var el = document.getElementById(fName); return el ? el.value.trim() : ''; }
    },
    textarea: {

  var lastSubmitHash = '';
  function computeContentHash(title, desc) {
    var str = title.trim().toLowerCase() + '||' + desc.trim().toLowerCase();
    var hash = 5381;
    for (var i = 0; i < str.length; i++) hash = ((hash << 5) + hash + str.charCodeAt(i)) & 0x7fffffff;

  }

  // ========== Friendly error mapping ==========
  function friendlyError(serverMsg) {
    if (!serverMsg) return '提交失败，请稍后重试';
    if (serverMsg.indexOf('频率超限') >= 0 || serverMsg.indexOf('每小时') >= 0) return '提交过于频繁，请稍后再试（每小时有次数限制）';
    if (serverMsg.indexOf('工作量证明') >= 0 && serverMsg.indexOf('已使用') >= 0) return '安全校验已过期，请刷新页面后重新提交';
    if (serverMsg.indexOf('工作量证明') >= 0) return '安全校验失败，请刷新页面后重试';
    if (serverMsg.indexOf('项目') >= 0 && serverMsg.indexOf('停用') >= 0) return '该项目已停用，无法提交反馈';
    if (serverMsg.indexOf('标题') >= 0 && serverMsg.indexOf('空') >= 0) return '请填写' + titleLabel();
    if (serverMsg.indexOf('文件') >= 0 && (serverMsg.indexOf('类型') >= 0 || serverMsg.indexOf('校验') >= 0)) return '文件格式不支持：' + serverMsg;
    if (serverMsg.indexOf('体过大') >= 0 || serverMsg.indexOf('MaxBytes') >= 0) return '文件总大小超出限制，请压缩后重试';
    return serverMsg;
  }

  // ========== PoW + Submit ==========
  async function computePoW(projectId, timestamp, difficulty, onProgress) {
    var prefix = '0'.repeat(difficulty);
    var encoder = new TextEncoder();
    var nonce = 0;
    var base = projectId + timestamp;
    while (true) {
      var payload = base + nonce;
      var hashBuffer = await crypto.subtle.digest('SHA-256', encoder.encode(payload));
      var hashArray = Array.from(new Uint8Array(hashBuffer));
      var hashHex = hashArray.map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
      if (hashHex.startsWith(prefix)) return { nonce: nonce, hash: hashHex };
      nonce++;
      if (nonce % 5000 === 0) {
        if (onProgress) onProgress(nonce);
        await new Promise(function(r){ setTimeout(r, 0); });
      }
    }
  }

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    statusMsg.className = 'status'; statusMsg.style.display = 'none';
    dupWarning.className = 'dup-warning'; dupWarning.innerHTML = '';
    faqHint.className = 'dup-warning'; faqHint.innerHTML = '';
    // Clear previous per-field errors
    formRoot.querySelectorAll('.field-error').forEach(function(el){ el.className = 'field-error'; el.textContent = ''; });

    var tEl = titleEl(), dEl = descEl();
    var title = tEl ? tEl.value.trim() : '';
    var description = dEl ? dEl.value.trim() : '';

    if (!title) {
      setFieldError('err_sys_title', '请填写' + titleLabel());
      if (tEl) tEl.focus();
      return;
    }

    // Require a one-tap confirmation when similar feedback was detected, but
    // never block submission — the user can still force-submit.
    if (lastDupCandidates.length > 0 && !dupForceConfirmed) {
      dupForceConfirmed = true;
      showDupForceConfirm();
      return;
    }

    // Validate required custom + system-description fields
    for (var i = 0; i < formSchema.length; i++) {
      var field = formSchema[i];
      if (!field.required) continue;
      var errId = '';
      var valid = true;
      if (field.sys === 'description') {
        valid = description !== '';
        errId = 'err_sys_description';
      } else if (field.sys) {
        continue; // title handled above; others validated server-side
      } else {
        var fName = 'cf_' + field.name;
        errId = 'err_' + fName;
        switch (field.type) {
          case 'text': case 'textarea': case 'email': case 'url': case 'tel':
          case 'number': case 'date': case 'time': case 'datetime': case 'month':
            var el = document.getElementById(fName);
            valid = el && el.value.trim() !== '';
            break;
          case 'select':
            var sel = document.getElementById(fName);
            valid = sel && sel.value !== '';
            break;
          case 'checkbox': case 'radio': case 'scale':
            valid = document.querySelector('input[name="' + fName + '"]:checked') !== null;
            break;
          case 'tags':
            var th = document.getElementById(fName);
            valid = th && th.value.trim() !== '';
            break;
        }
      }
      if (!valid) {
        setFieldError(errId, '请填写必填项：' + (field.label || field.name));
        var focusEl = document.getElementById(errId.replace('err_', (field.sys==='description'?'sys_description':(field.sys==='title'?'sys_title':'cf_'))));
        if (focusEl) focusEl.focus();
        return;
      }
    }

    // Duplicate detection
    var contentHash = computeContentHash(title, description);
    if (contentHash === lastSubmitHash) {
      dupWarning.className = 'dup-warning visible';
      dupWarning.textContent = '检测到您可能正在重复提交相同内容的反馈。如确需提交，请再次点击按钮。';
      if (dupWarning.dataset.confirmed !== '1') { dupWarning.dataset.confirmed = '1'; return; }
    }
    dupWarning.dataset.confirmed = '';

    submitBtn.disabled = true;
    powIndicator.classList.add('active');
    powBar.style.width = '0%';

    try {
      var projectId = PROJECT.slug;
      var timestamp = Math.floor(Date.now() / 1000).toString();
      powText.textContent = '正在计算工作量证明...';
      var powStart = Date.now();

      var pow = await computePoW(projectId, timestamp, powDifficulty, function(count) {
        var expected = Math.pow(16, powDifficulty);
        var pct = Math.min(95, Math.round(count / expected * 100));
        powBar.style.width = pct + '%';
        var elapsed = (Date.now() - powStart) / 1000;
        var rate = elapsed > 0 ? count / elapsed : 0;
        var remain = rate > 0 ? Math.max(0, (expected - count) / rate) : 0;
        var eta = remain > 1 ? '（预计剩余约 ' + Math.ceil(remain) + ' 秒）' : '';
        powText.textContent = '正在计算工作量证明... 已尝试 ' + count.toLocaleString() + ' 次' + eta;
      });

      powBar.style.width = '100%';
      powText.textContent = '安全校验完成，正在提交...';

      var fd = new FormData();
      fd.append('project_id', projectId);
      fd.append('title', title);
      fd.append('description', description);
      fd.append('contact_name', (document.getElementById('contact_name')||{value:''}).value.trim());
      fd.append('contact_email', (document.getElementById('contact_email')||{value:''}).value.trim());

      // Category (system field)
      if (hasSys.category) {
        var sc = document.getElementById('sys_category');
        if (sc) fd.append('category', sc.value);
      }

      // Custom data as JSON
      var customData = collectFormData();
      fd.append('custom_data', JSON.stringify(customData));

      // Managed uploads
      managedFiles.images.forEach(function(f){ fd.append('images', f); });
      managedFiles.files.forEach(function(f){ fd.append('files', f); });

      var resp = await fetch('/api/v1/feedback/submit', {
        method: 'POST',
        headers: { 'X-PoW-Timestamp': timestamp, 'X-PoW-Nonce': pow.nonce.toString() },
        body: fd
      });

      var data = await resp.json();
      if (resp.ok) {
        lastSubmitHash = contentHash;
        showSuccessCard(data.id, data.tracking_token);
      } else {
        showStatus('error', friendlyError(data.error));
      }
    } catch (err) {
      showStatus('error', '网络错误，请检查网络连接后重试');
    } finally {
      submitBtn.disabled = false;
      powIndicator.classList.remove('active');
    }
  });

      '<button class="btn-new" id="openTrackBtn">打开跟踪页</button>' +
      '<button class="btn-new" id="newFeedbackBtn">提交新反馈</button>' +
      '</div></div>';
    document.getElementById('copyTrackBtn').addEventListener('click', function(){
      if (navigator.clipboard) navigator.clipboard.writeText(trackUrl).then(function(){ document.getElementById('copyTrackBtn').textContent = '已复制'; });
      else { var ta = document.createElement('textarea'); ta.value = trackUrl; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); document.getElementById('copyTrackBtn').textContent = '已复制'; }
    });
    document.getElementById('openTrackBtn').addEventListener('click', function(){ window.open('/track#token=' + encodeURIComponent(trackingToken || ''), '_blank'); });
    document.getElementById('newFeedbackBtn').addEventListener('click', function(){ location.reload(); });
  }

  function showStatus(type, msg) {
    statusMsg.className = 'status ' + type;
    statusMsg.textContent = msg;
    statusMsg.style.display = 'block';
  }
})();
</script>
{{template "chromebot" .}}
