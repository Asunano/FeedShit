<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>反馈提交</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f5f5;color:#333;line-height:1.6}
.container{max-width:560px;margin:40px auto;padding:0 16px}
h1{font-size:1.4rem;font-weight:600;margin-bottom:6px}
.subtitle{color:#888;font-size:.85rem;margin-bottom:24px}
.card{background:#fff;border:1px solid #e2e2e2;border-radius:6px;padding:24px}
.field{margin-bottom:16px}
.field label{display:block;font-size:.85rem;font-weight:500;margin-bottom:4px;color:#555}
.field .req{color:#c00;margin-left:2px}
.field input[type=text],.field textarea,.field select{width:100%;padding:8px 10px;border:1px solid #d0d0d0;border-radius:4px;font-size:.9rem;font-family:inherit;transition:border-color .15s}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:#888}
.field textarea{resize:vertical;min-height:100px}
.field select{background:#fff}
.field .field-hint{font-size:.75rem;color:#999;margin-top:2px}
.field .field-error{font-size:.8rem;color:#c00;margin-top:4px;display:none}
.field .field-error.visible{display:block}
.checkbox-group,.radio-group{display:flex;flex-direction:column;gap:6px}
.checkbox-group label,.radio-group label{display:flex;align-items:center;gap:6px;font-weight:400;cursor:pointer;font-size:.85rem}
.checkbox-group input,.radio-group input{width:auto;margin:0}
.file-area{margin-bottom:16px}
.file-area .label{font-size:.85rem;font-weight:500;margin-bottom:4px;color:#555}
.file-input-wrap{position:relative;border:1px dashed #ccc;border-radius:4px;padding:12px;text-align:center;cursor:pointer;transition:border-color .15s}
.file-input-wrap:hover{border-color:#888}
.file-input-wrap input{position:absolute;inset:0;opacity:0;cursor:pointer}
.file-input-wrap .hint{color:#999;font-size:.8rem}
/* Image preview grid */
.preview-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.preview-item{position:relative;width:72px;height:72px;border:1px solid #e0e0e0;border-radius:4px;overflow:hidden;background:#fafafa}
.preview-item img{width:100%;height:100%;object-fit:cover}
.preview-item .preview-name{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);color:#fff;font-size:.55rem;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:1px 2px}
.preview-item .preview-remove{position:absolute;top:1px;right:1px;width:18px;height:18px;background:rgba(180,0,0,.75);color:#fff;border:none;border-radius:50%;font-size:.7rem;line-height:18px;text-align:center;cursor:pointer;display:none}
.preview-item:hover .preview-remove{display:block}
/* File list */
.file-list{margin-top:8px;font-size:.8rem;color:#666}
.file-list .item{display:flex;justify-content:space-between;align-items:center;padding:3px 0}
.file-list .item .remove{color:#c00;cursor:pointer;font-size:.75rem}
.project-badge{display:inline-block;background:#eee;padding:2px 8px;border-radius:3px;font-size:.8rem;color:#666;font-family:monospace}
.btn{display:block;width:100%;padding:10px;background:#333;color:#fff;border:none;border-radius:4px;font-size:.9rem;cursor:pointer;transition:background .15s}
.btn:hover{background:#555}
.btn:disabled{background:#aaa;cursor:not-allowed}
.status{margin-top:12px;padding:10px;border-radius:4px;font-size:.85rem;display:none}
.status.success{display:block;background:#e6f9e6;color:#1a7a1a;border:1px solid #b2e0b2}
.status.error{display:block;background:#fde8e8;color:#c00;border:1px solid #f5c6c6}
.status.loading{display:block;background:#fff8e1;color:#856404;border:1px solid #ffeeba}
/* PoW progress */
.pow-indicator{margin-top:8px;font-size:.8rem;color:#999;display:none}
.pow-indicator.active{display:block}
.pow-bar{height:3px;background:#e0e0e0;border-radius:2px;margin-top:4px;overflow:hidden}
.pow-bar-inner{height:100%;background:#888;width:0%;transition:width .3s}
/* Success card */
.success-card{text-align:center;padding:20px 0}
.success-card .check{font-size:2.5rem;color:#2a9d2a;margin-bottom:8px}
.success-card .fb-id{font-size:1.1rem;font-weight:600;color:#333;margin-bottom:4px}
.success-card .fb-note{font-size:.8rem;color:#888;margin-bottom:16px}
.success-card .btn-new{display:inline-block;padding:8px 24px;background:#f0f0f0;color:#555;border:1px solid #ddd;border-radius:4px;font-size:.85rem;cursor:pointer}
.success-card .btn-new:hover{background:#e4e4e4}
/* Privacy notice */
.privacy-notice{margin-top:16px;padding:10px 12px;background:#f9f9f9;border:1px solid #eee;border-radius:4px;font-size:.75rem;color:#999;line-height:1.5}
.privacy-notice strong{color:#777}
/* Duplicate warning */
.dup-warning{margin-top:8px;padding:8px 10px;background:#fff3cd;color:#856404;border:1px solid #ffeeba;border-radius:4px;font-size:.8rem;display:none}
.dup-warning.visible{display:block}
.faq-hint-title{font-weight:600;margin-bottom:4px}
.faq-item{margin:4px 0}
.faq-q{color:#664d03;text-decoration:none;cursor:pointer;font-weight:500}
.faq-q:hover{text-decoration:underline}
.faq-a{margin:4px 0 6px;padding:6px 8px;background:rgba(0,0,0,.03);border-radius:4px;white-space:pre-wrap;word-break:break-word}
.faq-still{margin-top:6px;text-align:right}
.faq-still a{color:#664d03;font-weight:600;text-decoration:none}
.faq-still a:hover{text-decoration:underline}
[data-theme="dark"] .faq-q,[data-theme="dark"] .faq-still a{color:#f1d56e}
[data-theme="dark"] .faq-a{background:rgba(255,255,255,.06)}
/* Duplicate candidate cards (M5) */
.dup-title{font-weight:600;margin-bottom:4px}
.dup-item{margin:6px 0;padding:6px 8px;background:rgba(0,0,0,.03);border-radius:4px}
.dup-card-title{font-weight:500;color:#664d03;word-break:break-word}
.dup-card-summary{margin:2px 0 4px;color:#856404;word-break:break-word;max-height:3.2em;overflow:hidden}
.dup-card-link{color:#664d03;font-weight:600;text-decoration:none}
.dup-card-link:hover{text-decoration:underline}
.dup-still{margin-top:6px;text-align:right}
.dup-still a{color:#664d03;font-weight:600;text-decoration:none}
.dup-still a:hover{text-decoration:underline}
[data-theme="dark"] .dup-card-title,[data-theme="dark"] .dup-card-link,[data-theme="dark"] .dup-still a{color:#f1d56e}
[data-theme="dark"] .dup-item{background:rgba(255,255,255,.06)}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:1000;display:none;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:8px;padding:24px;width:90%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal h3{margin:0 0 8px 0;font-size:1.05rem}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.modal .btn{padding:8px 18px;border:1px solid #ddd;border-radius:4px;background:#fff;cursor:pointer;font-size:.85rem}
.modal .btn-primary{background:#e53e3e;color:#fff;border-color:#e53e3e}
.modal .btn-primary:hover{background:#c53030}
.modal .field{margin-bottom:12px}
.modal .field label{display:block;font-size:.8rem;font-weight:600;margin-bottom:4px;color:#333}
.modal .field input{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:4px;font-size:.85rem;box-sizing:border-box}
.modal .field input:focus{outline:none;border-color:#e53e3e;box-shadow:0 0 0 2px rgba(229,62,62,.15)}
[data-theme="dark"] .modal{background:#2d2d2d}
[data-theme="dark"] .modal h3{color:#eee}
[data-theme="dark"] .modal .field label{color:#ccc}
[data-theme="dark"] .modal input{background:#3d3d3d;border-color:#555;color:#eee}
[data-theme="dark"] .modal .btn{background:#3d3d3d;border-color:#555;color:#ddd}
</style>
<style id="theme-vars">
/* ===== Theme tokens (M14) ===== */
:root{
  --bg:#f5f5f5;
  --fg:#333;
  --panel:#fff;
  --border:#e2e2e2;
  --muted:#888;
  --field-label:#555;
  --field-fg:#333;
  --primary:#333;
  --primary-fg:#fff;
  --danger:#c00;
  --subtle:#fafafa;
  --hint:#999;
  --link:#2563eb;
}
[data-theme="dark"]{
  --bg:#1a1a1a;
  --fg:#e2e2e2;
  --panel:#242424;
  --border:#383838;
  --muted:#9a9a9a;
  --field-label:#bbb;
  --field-fg:#e2e2e2;
  --primary:#2d2d2d;
  --primary-fg:#fff;
  --danger:#ff6b6b;
  --subtle:#2c2c2c;
  --hint:#8a8a8a;
  --link:#6ea8fe;
}
[data-theme="dark"] body{background:var(--bg);color:var(--fg)}
[data-theme="dark"] .card{background:var(--panel);border-color:var(--border)}
[data-theme="dark"] .field label{color:var(--field-label)}
[data-theme="dark"] .field input[type=text],
[data-theme="dark"] .field textarea,
[data-theme="dark"] .field select{background:var(--panel);border-color:var(--border);color:var(--field-fg)}
[data-theme="dark"] .field .field-hint{color:var(--hint)}
[data-theme="dark"] .file-area .label{color:var(--field-label)}
[data-theme="dark"] .file-input-wrap{border-color:var(--border)}
[data-theme="dark"] .file-input-wrap .hint{color:var(--hint)}
[data-theme="dark"] .preview-item{background:var(--subtle);border-color:var(--border)}
[data-theme="dark"] .project-badge{background:var(--subtle);color:var(--muted)}
[data-theme="dark"] .btn{background:var(--primary);color:var(--primary-fg)}
[data-theme="dark"] .btn:hover{background:#444}
[data-theme="dark"] .privacy-notice{background:var(--subtle);border-color:var(--border);color:var(--hint)}
[data-theme="dark"] .privacy-notice strong{color:var(--muted)}
[data-theme="dark"] .subtitle{color:var(--muted)}
[data-theme="dark"] .success-card .fb-id{color:var(--fg)}
[data-theme="dark"] .success-card .fb-note{color:var(--muted)}
[data-theme="dark"] .success-card .btn-new{background:var(--subtle);color:var(--field-label);border-color:var(--border)}
[data-theme="dark"] .success-card .btn-new:hover{background:#333}
[data-theme="dark"] .file-list{color:var(--muted)}
[data-theme="dark"] .field-error{color:var(--danger)}
[data-theme="dark"] .status.success{background:#1c3a28;color:#7ac99a;border-color:#2c5a40}
[data-theme="dark"] .status.error{background:#3a1f1f;color:#ff9b9b;border-color:#5a2a2a}
[data-theme="dark"] .status.loading{background:#3a3418;color:#f1d56e;border-color:#5a5028}
[data-theme="dark"] .dup-warning{background:#3a3418;color:#f1d56e;border-color:#5a5028}
[data-theme="dark"] #trackLinkBox{background:var(--subtle) !important;border-color:var(--border) !important;color:var(--fg) !important}

/* page head + theme toggle */
.page-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:6px}
.theme-toggle{padding:5px 12px;border:1px solid var(--border);background:var(--panel);color:var(--muted);border-radius:4px;cursor:pointer;font-size:.9rem;min-height:36px}
.theme-toggle:hover{background:#333}

/* ===== Responsive (M14) ===== */
@media (max-width:768px){
  .container{margin:16px auto;padding:0 12px}
  .card{padding:16px}
  .field input[type=text],.field textarea,.field select{min-height:40px}
  .btn{min-height:44px}
  .file-input-wrap{padding:16px}
}

/* Modular form schema styles */
.field-half{width:50%;display:inline-block;vertical-align:top;box-sizing:border-box;padding-right:8px}
.field-third{width:33.33%;display:inline-block;vertical-align:top;box-sizing:border-box;padding-right:8px}
.help-text{font-size:.75rem;color:#888;margin-top:2px;margin-bottom:0}
.rating-group{display:flex;gap:4px;padding:4px 0}
.rating-star{font-size:1.5rem;cursor:pointer;opacity:.3;transition:opacity .15s}
.rating-star.active,.rating-star:hover{opacity:1}
.toggle-switch{position:relative;display:inline-block;width:44px;height:24px;vertical-align:middle}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#ccc;border-radius:24px;transition:.2s}
.toggle-slider::before{content:"";position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle-switch input:checked + .toggle-slider{background:#2563eb}
.toggle-switch input:checked + .toggle-slider::before{transform:translateX(20px)}
.toggle-label{margin-left:8px;font-size:.85rem;vertical-align:middle}
.tags-input{border:1px solid #ddd;border-radius:4px;padding:4px}
.tags-input input{border:none;outline:none;width:100%;padding:4px}
.tag-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.tag-item{background:#e5e7eb;border-radius:3px;padding:2px 6px;font-size:.8rem;display:inline-flex;align-items:center;gap:4px}
.tag-remove{cursor:pointer;font-weight:bold;color:#999;font-size:.75rem}
.tag-remove:hover{color:#c00}
.section-divider{margin:16px 0;padding:8px 0;border-top:1px solid #eee}
.section-title{font-size:1rem;font-weight:600;margin:0 0 4px 0;color:#333}
.section-desc{font-size:.8rem;color:#888;margin:0}
.custom-html{padding:4px 0}
.md-preview{background:#f9f9f9;border:1px solid #ddd}
@media (max-width:768px){
  .field-half,.field-third{width:100%;display:block;padding-right:0}
}
</style>
<script>
// ===== 主题（暗黑模式）（M14） =====
(function(){
  "use strict";
  var THEME_KEY = 'feedshit-theme';
  function prefersDark(){
    return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  }
  function applyTheme(t){
    document.documentElement.setAttribute('data-theme', t);
    var btn = document.getElementById('themeToggle');
    if (btn) btn.textContent = (t === 'dark') ? '☀' : '🌙';
  }
  function initTheme(){
    var saved = null;
    try { saved = localStorage.getItem(THEME_KEY); } catch (e) {}
    applyTheme(saved || (prefersDark() ? 'dark' : 'light'));
  }
  window.toggleTheme = function(){
    var cur = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', cur);
    try { localStorage.setItem(THEME_KEY, cur); } catch (e) {}
    applyTheme(cur);
  };
  initTheme();
  if (window.matchMedia){
    var mq = window.matchMedia('(prefers-color-scheme: dark)');
    var onChange = function(e){
      var saved = null;
      try { saved = localStorage.getItem(THEME_KEY); } catch (err) {}
      if (!saved) applyTheme(e.matches ? 'dark' : 'light');
    };
    if (mq.addEventListener) mq.addEventListener('change', onChange);
    else if (mq.addListener) mq.addListener(onChange);
  }
  document.addEventListener('DOMContentLoaded', function(){
    applyTheme(document.documentElement.getAttribute('data-theme'));
  });
})();
</script>
</head>
<body>
<div class="container">
  <div class="page-head">
    <h1 id="pageTitle">反馈提交</h1>
    <button id="themeToggle" class="theme-toggle" onclick="toggleTheme()" title="切换暗黑 / 明亮模式">🌙</button>
  </div>
  <p class="subtitle" id="pageSubtitle">项目：<span class="project-badge" id="projectDisplay">-</span></p>
  <div class="card">
    <form id="feedbackForm" enctype="multipart/form-data">
      <div class="field">
        <label for="title">问题标题 <span class="req">*</span></label>
        <input type="text" id="title" name="title" required placeholder="简要描述问题">
        <div class="field-error" id="titleError"></div>
      </div>
      <div class="field">
        <label for="description">详细描述</label>
        <textarea id="description" name="description" placeholder="请详细描述遇到的问题、复现步骤等信息"></textarea>
      </div>

      <div class="field" id="categoryField" style="display:none">
        <label for="category">问题分类</label>
        <select id="category" name="category">
          <option value="">请选择分类（选填）</option>
        </select>
      </div>

      <!-- Notification opt-in -->
      <div class="field">
        <label class="checkbox-label" style="display:flex;align-items:flex-start;gap:8px;cursor:pointer">
          <input type="checkbox" id="notify_consent" style="margin-top:2px;width:auto">
          <span>📬 接收反馈处理通知<br><small style="color:#888;font-weight:normal">勾选后可填写称呼和邮箱，当反馈状态更新或有回复时您将收到邮件通知，并获取反馈跟踪链接。</small></span>
        </label>
      </div>
      <input type="hidden" id="contact_name" name="contact_name">
      <input type="hidden" id="contact_email" name="contact_email">

      <!-- Dynamic custom fields injected here -->
      <div id="customFieldsContainer"></div>

      <div class="file-area">
        <div class="label">截图上传</div>
        <div class="file-input-wrap">
          <input type="file" id="images" name="images" multiple accept="image/*">
          <span class="hint">点击或拖拽图片到此处</span>
        </div>
        <div class="preview-grid" id="imagePreview"></div>
      </div>
      <div class="file-area">
        <div class="label">日志文件</div>
        <div class="file-input-wrap">
          <input type="file" id="files" name="files" multiple accept=".log,.txt,.csv,.json">
          <span class="hint">点击或拖拽文件到此处（.log / .txt / .csv / .json）</span>
        </div>
        <div class="file-list" id="fileList"></div>
      </div>

      <div class="dup-warning" id="dupWarning">检测到您可能正在重复提交相同内容的反馈。</div>

      <div class="dup-warning" id="faqHint"></div>

      <button type="submit" class="btn" id="submitBtn">提交反馈</button>
      <div class="pow-indicator" id="powIndicator">
        <span id="powText">正在计算工作量证明...</span>
        <div class="pow-bar"><div class="pow-bar-inner" id="powBar"></div></div>
      </div>
      <div class="status" id="statusMsg"></div>
    </form>

    <!-- Contact info modal -->
    <div class="modal-overlay" id="contactModal">
      <div class="modal" style="max-width:420px">
        <h3>📬 接收通知</h3>
        <p style="font-size:.85rem;color:#666;margin-bottom:16px">填写联系方式后，反馈状态更新或有回复时您将收到邮件通知。</p>
        <div class="field">
          <label for="modal_contact_name">您的称呼</label>
          <input type="text" id="modal_contact_name" placeholder="如何称呼您？">
        </div>
        <div class="field">
          <label for="modal_contact_email">邮箱 <span class="req">*</span></label>
          <input type="email" id="modal_contact_email" placeholder="用于接收通知和跟踪链接">
        </div>
        <div class="modal-actions" style="margin-top:16px">
          <button class="btn" onclick="closeContactModal()">取消</button>
          <button class="btn btn-primary" onclick="confirmContactModal()">确认</button>
        </div>
      </div>
    </div>

    <div class="privacy-notice">
      <strong>隐私说明：</strong>您提交的信息（标题、描述、截图及联系方式）仅用于问题处理，管理员可查看全部内容。联系信息为选填项，不填则视为匿名反馈。
    </div>
  </div>
</div>
<script>
(function(){
  // Project data injected by server — unique per /fb/{slug} page
  var PROJECT = /*__PROJECT_DATA__*/null;
  if (!PROJECT) {
    document.body.innerHTML = '<div style="text-align:center;padding:60px;font-family:sans-serif"><h1>页面错误</h1><p>项目信息未加载</p></div>';
    return;
  }

  // Set page title and project display
  document.title = PROJECT.name + ' - 反馈提交';
  document.getElementById('pageTitle').textContent = PROJECT.name + ' 反馈';
  document.getElementById('projectDisplay').textContent = PROJECT.slug;
  if (PROJECT.description) {
    document.getElementById('pageSubtitle').innerHTML =
      '项目：<span class="project-badge">' + escHtml(PROJECT.slug) + '</span> ' +
      '<span style="color:#aaa;font-size:.8rem">' + escHtml(PROJECT.description) + '</span>';
  }

  // ========== Populate category dropdown ==========
  var categories = PROJECT.categories || [];
  if (categories.length > 0) {
    var catSelect = document.getElementById('category');
    var catField = document.getElementById('categoryField');
    categories.forEach(function(cat) {
      var opt = document.createElement('option');
      opt.value = cat.key;
      opt.textContent = cat.name;
      catSelect.appendChild(opt);
    });
    catField.style.display = '';
  }

  // ========== Field Registry — modular field type system ==========
  // Add a new type by appending an entry; no need to touch render/collect/validate.

  var FIELD_REGISTRY = {
    text: {
      label: '单行文本',
      render: function(f, fName) {
        return '<input type="text" id="' + fName + '" name="' + fName + '"' + _r(f) + ' placeholder="' + _a(f.placeholder||'') + '"' +
          _at('minlength', f.min_length) + _at('maxlength', f.max_length) + _at('pattern', f.pattern) + '>';
      },
      collect: function(f, fName) { var el = document.getElementById(fName); return el ? el.value.trim() : ''; }
    },
    textarea: {
      label: '多行文本',
      render: function(f, fName) {
        return '<textarea id="' + fName + '" name="' + fName + '"' + _r(f) + ' placeholder="' + _a(f.placeholder||'') + '"' +
          _at('rows', f.rows||4) + _at('maxlength', f.max_length) + ' style="min-height:80px"></textarea>';
      },
      collect: function(f, fName) { var el = document.getElementById(fName); return el ? el.value.trim() : ''; }
    },

  async function computePoW(projectId, timestamp, difficulty, onProgress) {
    var prefix = '0'.repeat(difficulty);
    var encoder = new TextEncoder();
    var nonce = 0;
    var base = projectId + timestamp;

    while (true) {
      var payload = base + nonce;
      var hashBuffer = await crypto.subtle.digest('SHA-256', encoder.encode(payload));
      var hashArray = Array.from(new Uint8Array(hashBuffer));
      var hashHex = hashArray.map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');

      if (hashHex.startsWith(prefix)) {
        return { nonce: nonce, hash: hashHex };
      }
      nonce++;

      // Report progress every 5000 iterations
      if (nonce % 5000 === 0) {
        if (onProgress) onProgress(nonce);
        await new Promise(function(r){ setTimeout(r, 0); });
      }
    }
  }

    });
    html += '<div class="faq-still"><a onclick="window.__scrollToSubmit()">仍未解决？仍要提交新反馈 →</a></div>';
    faqHint.className = 'dup-warning visible';
    faqHint.innerHTML = html;
  }

  window.__toggleFaq = function(id) {
    var el = document.getElementById(id);
    if (el) el.style.display = (el.style.display === 'none') ? 'block' : 'none';
  };

  window.__scrollToSubmit = function() {
    faqHint.className = 'dup-warning';
    faqHint.innerHTML = '';
    dupWarning.className = 'dup-warning';
    dupWarning.innerHTML = '';
    var sb = document.getElementById('submitBtn');
    if (sb) sb.scrollIntoView({ behavior: 'smooth', block: 'center' });
  };

  function searchFAQ() {
    if (!PROJECT || !PROJECT.slug) return;
    var q = (document.getElementById('title').value + ' ' + document.getElementById('description').value).trim();
    if (q.length < 1) {
      // Don't clear hint for very short queries — FAQ search works on any input
      if (q.length === 0) {
        faqHint.className = 'dup-warning';
        faqHint.innerHTML = '';
      }
      lastFaqQuery = '';
      return;
    }
    if (q === lastFaqQuery) return; // dedupe identical queries
    lastFaqQuery = q;
    fetch('/api/v1/faq?q=' + encodeURIComponent(q) + '&project=' + encodeURIComponent(PROJECT.slug))
      .then(function(r) { return r.json(); })
      .then(function(d) { renderFaqHint(d && d.faqs ? d.faqs : []); })
      .catch(function() { faqHint.className = 'dup-warning'; });
  }

  function debounceFaqSearch() {
    if (faqTimer) clearTimeout(faqTimer);
    faqTimer = setTimeout(searchFAQ, 300);
  }

  // ========== Duplicate feedback detection (M5) ==========
  function renderDupWarning(cands) {
    if (!cands || cands.length === 0) {
      dupWarning.className = 'dup-warning';
      dupWarning.innerHTML = '';
      return;
    }
    var html = '<div class="dup-title">检测到您可能正在重复提交相同内容的反馈：</div>';
    cands.forEach(function(c) {
      html += '<div class="dup-item">'
        + '<div class="dup-card-title">' + escHtml(c.title) + '</div>'
        + (c.summary ? '<div class="dup-card-summary">' + escHtml(c.summary) + '</div>' : '')
        + '<a class="dup-card-link" href="/track?token=' + encodeURIComponent(c.token) + '">查看原反馈 →</a>'
        + '</div>';
    });
    html += '<div class="dup-still"><a onclick="window.__scrollToSubmit()">仍要提交新反馈 →</a></div>';
    dupWarning.className = 'dup-warning visible';
    dupWarning.innerHTML = html;
  }

  function searchDuplicate() {
    if (!PROJECT || !PROJECT.slug) return;
    var q = (document.getElementById('title').value + ' ' + document.getElementById('description').value).trim();
    if (q.length < 3) {
      dupWarning.className = 'dup-warning';
      dupWarning.innerHTML = '';
      lastDupQuery = '';
      return;
    }
    if (q === lastDupQuery) return; // dedupe identical queries
    lastDupQuery = q;
    fetch('/api/v1/feedback/check-duplicate?q=' + encodeURIComponent(q) + '&project=' + encodeURIComponent(PROJECT.slug))
      .then(function(r) { return r.json(); })
      .then(function(d) { renderDupWarning(d && d.candidates ? d.candidates : []); })
      .catch(function() { dupWarning.className = 'dup-warning'; });
  }

  function debounceDupSearch() {
    if (dupTimer) clearTimeout(dupTimer);
    dupTimer = setTimeout(searchDuplicate, 300);
  }

  // Clear field errors on input
  document.getElementById('title').addEventListener('input', function(){
    titleError.className = 'field-error';
    titleError.textContent = '';
    dupWarning.className = 'dup-warning';
    debounceFaqSearch();
    debounceDupSearch();
  });
  document.getElementById('description').addEventListener('input', function(){
    debounceFaqSearch();
    debounceDupSearch();
  });

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    statusMsg.className = 'status';
    statusMsg.style.display = 'none';
    titleError.className = 'field-error';
    titleError.textContent = '';
    dupWarning.className = 'dup-warning';
    dupWarning.innerHTML = '';
    faqHint.className = 'dup-warning';
    faqHint.innerHTML = '';

    var title = document.getElementById('title').value.trim();
    var description = document.getElementById('description').value.trim();

    if (!title) {
      titleError.textContent = '请填写问题标题';
      titleError.className = 'field-error visible';
      document.getElementById('title').focus();
      return;
    }

    // Validate required custom fields
    for (var i = 0; i < formSchema.length; i++) {
      var field = formSchema[i];
      if (!field.required) continue;
      var fName = 'cf_' + field.name;
      var valid = false;
      switch (field.type) {
        case 'text':
        case 'textarea':
          var el = document.getElementById(fName);
          valid = el && el.value.trim() !== '';
          break;
        case 'select':
          var sel = document.getElementById(fName);
          valid = sel && sel.value !== '';
          break;
        case 'checkbox':
        case 'radio':
          valid = document.querySelector('input[name="' + fName + '"]:checked') !== null;
          break;
      }
      if (!valid) {
        showStatus('error', '请填写必填项：' + field.label);
        return;
      }
    }

    // Duplicate detection
    var contentHash = computeContentHash(title, description);
    if (contentHash === lastSubmitHash) {
      dupWarning.className = 'dup-warning visible';
      dupWarning.textContent = '检测到您可能正在重复提交相同内容的反馈。如确需提交，请再次点击按钮。';
      // Allow second click to proceed
      if (dupWarning.dataset.confirmed !== '1') {
        dupWarning.dataset.confirmed = '1';
        return;
      }
    }
    dupWarning.dataset.confirmed = '';

    submitBtn.disabled = true;
    powIndicator.classList.add('active');
    powBar.style.width = '0%';

    try {
      var projectId = PROJECT.slug;
      var timestamp = Math.floor(Date.now() / 1000).toString();
      powText.textContent = '正在计算工作量证明...';

      var pow = await computePoW(projectId, timestamp, powDifficulty, function(count) {
        powText.textContent = '正在计算工作量证明... 已尝试 ' + count.toLocaleString() + ' 次';
        // Estimate progress (probabilistic: expect ~16^difficulty attempts)
        var expected = Math.pow(16, powDifficulty);
        var pct = Math.min(95, Math.round(count / expected * 100));
        powBar.style.width = pct + '%';
      });

      powBar.style.width = '100%';
      powText.textContent = '安全校验完成，正在提交...';

      var fd = new FormData();
      fd.append('project_id', projectId);
      fd.append('title', title);
      fd.append('description', description);
      fd.append('contact_name', document.getElementById('contact_name').value.trim());
      fd.append('contact_email', document.getElementById('contact_email').value.trim());

      // Category (only if the field is visible)
      var catField = document.getElementById('categoryField');
      if (catField && catField.style.display !== 'none') {
        fd.append('category', document.getElementById('category').value);
      }

      // Custom data as JSON
      var customData = collectCustomData();
      fd.append('custom_data', JSON.stringify(customData));

      // Append managed files
      imageFiles.forEach(function(f){ fd.append('images', f); });
      logFiles.forEach(function(f){ fd.append('files', f); });

      var resp = await fetch('/api/v1/feedback/submit', {
        method: 'POST',
        headers: {
          'X-PoW-Timestamp': timestamp,
          'X-PoW-Nonce': pow.nonce.toString()
        },
        body: fd
      });

      var data = await resp.json();
      if (resp.ok) {
        lastSubmitHash = contentHash;
        showSuccessCard(data.id, data.tracking_token);
      } else {
        showStatus('error', friendlyError(data.error));
      }
    } catch (err) {
      showStatus('error', '网络错误，请检查网络连接后重试');
    } finally {
      submitBtn.disabled = false;
      powIndicator.classList.remove('active');
    }
  });

  // ========== Success card ==========
  function showSuccessCard(feedbackId, trackingToken) {
    var trackUrl = window.location.origin + '/track#token=' + encodeURIComponent(trackingToken || '');
    var formEl = document.getElementById('feedbackForm');
    formEl.innerHTML = '<div class="success-card">' +
      '<div class="check">\u2713</div>' +
      '<div class="fb-id">反馈已提交</div>' +
      '<div class="fb-id">编号 #' + feedbackId + '</div>' +
      '<div class="fb-note">请保存以下跟踪链接，可随时查看处理进度和回复：</div>' +
      '<div style="margin:12px 0;padding:10px;background:#f5f5f5;border:1px solid #e0e0e0;border-radius:4px;word-break:break-all;font-size:.8rem;font-family:monospace;text-align:left" id="trackLinkBox">' + trackUrl + '</div>' +
      '<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">' +
      '<button class="btn-new" id="copyTrackBtn">复制链接</button>' +
      '<button class="btn-new" id="openTrackBtn">打开跟踪页</button>' +
      '<button class="btn-new" id="newFeedbackBtn">提交新反馈</button>' +
      '</div>' +
      '</div>';
    document.getElementById('copyTrackBtn').addEventListener('click', function(){
      if (navigator.clipboard) {
        navigator.clipboard.writeText(trackUrl).then(function(){
          document.getElementById('copyTrackBtn').textContent = '已复制';
        });
      } else {
        // Fallback
        var ta = document.createElement('textarea');
        ta.value = trackUrl;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        document.getElementById('copyTrackBtn').textContent = '已复制';
      }
    });
    document.getElementById('openTrackBtn').addEventListener('click', function(){
      window.open('/track#token=' + encodeURIComponent(trackingToken || ''), '_blank');
    });
    document.getElementById('newFeedbackBtn').addEventListener('click', function(){
      location.reload();
    });
  }

  function showStatus(type, msg) {
    statusMsg.className = 'status ' + type;
    statusMsg.textContent = msg;
    statusMsg.style.display = 'block';
  }
})();
</script>
</body>
</html>
