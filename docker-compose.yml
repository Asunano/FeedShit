services:
  feedshit:
    build:
      context: .
      args:
        VERSION: ${TAG:-1.0}
    # Immutable, traceable image tag (not bare `latest`).
    image: feedshit:${TAG:-1.0}
    container_name: feedshit
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=changeme
      - BASE_URL=http://localhost:8080
      # Email (optional, can also be configured via admin UI)
      - SMTP_HOST=
      - SMTP_PORT=587
      - SMTP_USER=
      - SMTP_PASS=
      - SMTP_FROM=
      - SMTP_TO=
      - NOTIFY_ENABLE=false
      # PoW difficulty (leading hex zeros)
      - POW_DIFFICULTY=4
      # Rate limit: max submissions per IP per hour
      - RATE_LIMIT_PER_HOUR=3
      # Max upload size in MB
      - MAX_UPLOAD_MB=20
      # Webhook (DEPRECATED — the global webhook_url no longer triggers outbound
      # notifications; configure Webhook subscriptions in the admin panel instead)
      - WEBHOOK_URL=
      # Trusted proxies (comma-separated, * for all) used to read real client IP
      - TRUSTED_PROXIES=
      # Master encryption key (REQUIRED). 32 raw bytes or 64 hex chars.
      # Generate: head -c 32 /dev/urandom | xxd -p -c 32
      - FEEDSHIT_MASTER_KEY=
      # Default per-token rate limit (requests/hour) for new API tokens
      - API_TOKEN_DEFAULT_RATE_LIMIT=60
      # Backup retention in days (old daily backups are pruned automatically)
      - BACKUP_RETENTION_DAYS=30
